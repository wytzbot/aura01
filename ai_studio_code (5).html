<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
  <title>AURA - Your Coding Partner</title>

  <!-- External Resources -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { orange: '#FF5500', darkBg: '#050505', panelBg: '#0F0F0F', borderDark: '#1A1A1A' } } }
    }
  </script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    body { height: 100dvh; background-color: #050505; color: white; font-family: sans-serif; overflow: hidden; }
    
    /* Smooth background */
    .bg-aura {
      background: radial-gradient(circle at 50% 50%, #1a0800 0%, #050505 100%);
    }

    /* Glassmorphism */
    .glass { background: rgba(15, 15, 15, 0.8); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
    
    /* Input Container Fix for Mobile Keyboard */
    .input-wrapper {
      position: sticky;
      bottom: 0;
      width: 100%;
      padding: env(safe-area-inset-bottom) 1rem 1rem 1rem;
      z-index: 50;
    }

    /* Message Bubbles */
    .user-msg { background: #1a0c00; border: 1px solid rgba(255, 85, 0, 0.3); border-radius: 1.2rem 1.2rem 0 1.2rem; }
    .ai-msg { background: #0F0F0F; border: 1px solid #1A1A1A; border-radius: 1.2rem 1.2rem 1.2rem 0; }

    /* Rotating Text Animation */
    .typing-cursor::after { content: '|'; animation: blink 1s infinite; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
  </style>
</head>
<body class="antialiased">

  <canvas id="particleCanvas" class="fixed inset-0 pointer-events-none z-0"></canvas>

  <div id="app" class="relative z-10 h-full flex flex-col overflow-hidden">

    <!-- 1. WELCOME PAGE -->
    <section id="welcomePage" class="flex-1 flex flex-col items-center justify-center p-6 text-center bg-aura">
      <div class="max-w-md w-full space-y-12">
        <div>
            <h1 class="text-7xl font-black tracking-tighter text-white mb-2">AURA</h1>
            <div class="h-6">
                <p id="rotatingDesc" class="text-orange font-mono text-sm tracking-widest uppercase typing-cursor"></p>
            </div>
        </div>
        <div class="space-y-4">
            <button onclick="showPage('auth')" class="w-full py-4 bg-orange text-black font-bold rounded-2xl shadow-lg active:scale-95 transition">Get Started</button>
            <button onclick="showPage('auth')" class="w-full py-4 bg-white/5 border border-white/10 text-white font-medium rounded-2xl hover:bg-white/10">Log In</button>
        </div>
      </div>
    </section>

    <!-- 2. AUTH PAGE -->
    <section id="authPage" class="hidden flex-1 flex flex-col items-center justify-center p-4">
      <div class="w-full max-w-md bg-panelBg border border-borderDark rounded-[2rem] p-8 relative">
        <button onclick="showPage('welcome')" class="absolute top-8 left-8 text-gray-500 hover:text-white"><i data-lucide="arrow-left"></i></button>
        <h2 class="text-2xl font-bold text-center mb-8">Access AURA</h2>
        <form id="authForm" class="space-y-4">
          <input type="email" id="inputEmail" placeholder="Email" class="w-full bg-black border border-borderDark rounded-xl px-5 py-4 focus:border-orange outline-none" required>
          <input type="password" id="inputPassword" placeholder="Password" class="w-full bg-black border border-borderDark rounded-xl px-5 py-4 focus:border-orange outline-none" required>
          <div id="authError" class="text-red-500 text-xs hidden"></div>
          <button type="submit" class="w-full py-4 bg-orange text-black font-bold rounded-xl mt-2">Continue</button>
        </form>
      </div>
    </section>

    <!-- 3. CHAT PAGE -->
    <section id="chatPage" class="hidden flex-1 flex flex-col h-full bg-darkBg">
      <!-- Header -->
      <header class="h-16 flex items-center justify-between px-5 glass border-b border-borderDark shrink-0">
        <div class="flex items-center gap-3">
            <button id="btnToggleSidebar" class="text-gray-400"><i data-lucide="menu"></i></button>
            <span class="text-sm font-bold tracking-tight">AURA AI</span>
        </div>
        <button onclick="createNewChat()" class="text-orange bg-orange/10 p-2 rounded-lg"><i data-lucide="plus"></i></button>
      </header>

      <!-- Sidebar (Drawer) -->
      <div id="sidebar" class="fixed inset-y-0 left-0 w-72 glass border-r border-borderDark z-[60] transform -translate-x-full transition-transform duration-300 flex flex-col">
        <div class="p-6 border-b border-borderDark flex justify-between">
            <span class="font-bold">History</span>
            <button id="btnCloseSidebar"><i data-lucide="x" class="w-5 h-5"></i></button>
        </div>
        <div id="chatHistoryList" class="flex-1 overflow-y-auto p-4 space-y-2"></div>
        <div class="p-4 border-t border-borderDark">
            <button onclick="location.reload()" class="flex items-center gap-2 text-red-500 text-sm"><i data-lucide="log-out" class="w-4 h-4"></i> Sign Out</button>
        </div>
      </div>
      <div id="sidebarOverlay" class="fixed inset-0 bg-black/60 z-50 hidden"></div>

      <!-- Messages -->
      <main class="flex-1 overflow-y-auto p-4 space-y-6 pb-32" id="messagesContainer">
        <div id="emptyGreeting" class="h-full flex flex-col items-center justify-center text-center space-y-4">
            <div class="w-16 h-16 bg-orange/10 rounded-full flex items-center justify-center text-orange">
                <i data-lucide="sparkles" class="w-8 h-8"></i>
            </div>
            <h2 class="text-2xl font-bold">Hello. I am AURA.</h2>
            <p id="rotatingTip" class="text-gray-500 text-xs font-mono transition-opacity duration-500"></p>
        </div>
      </main>

      <!-- Input Bar -->
      <div class="input-wrapper">
        <div class="max-w-3xl mx-auto">
          
          <!-- ATTACHMENT PREVIEW (PILL) -->
          <div id="attachmentPreview" class="hidden mb-3 inline-flex items-center gap-3 p-2 bg-panelBg border border-orange/40 rounded-2xl shadow-2xl animate-in slide-in-from-bottom-2">
            <div class="relative">
                <img id="imgPreviewThumb" class="w-12 h-12 object-cover rounded-xl hidden">
                <div id="filePreviewIcon" class="w-12 h-12 bg-black rounded-xl flex items-center justify-center hidden"><i data-lucide="file-text" class="text-orange"></i></div>
                <button id="btnRemoveAttachment" class="absolute -top-2 -right-2 bg-red-500 rounded-full p-0.5"><i data-lucide="x" class="w-3 h-3"></i></button>
            </div>
            <div class="pr-4"><p id="attachmentName" class="text-[10px] text-gray-400 truncate max-w-[120px
