<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURA AI</title>
<style>
  :root{
    --bg:#050505; --card:#111; --text:#EAEAEA; --muted:#888;
    --orange:#FF7A00; --orange-dark:#FF4500; --border:#222;
  }
  *{margin:0;padding:0;box-sizing:border-box;font-family:"Inter",sans-serif}
  body{background:var(--bg);color:var(--text);overflow:hidden}

  /* AUTH SCREEN */
  #authScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;background:radial-gradient(circle at 50% 50%, #FF7A0022, transparent 70%)}
  #authScreen h1{background:linear-gradient(90deg,var(--orange),var(--orange-dark));-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-size:3rem;font-weight:800;animation:bounce 2s infinite}
  @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
 .auth-box{background:var(--card);padding:30px;border-radius:16px;width:90%;max-width:400px;border:1px solid var(--border)}
 .auth-box input{width:100%;padding:12px;margin:8px 0;background:#1a1a1a;border:1px solid var(--border);border-radius:8px;color:var(--text)}
 .btn{background:linear-gradient(90deg,var(--orange),var(--orange-dark));border:none;padding:12px;border-radius:8px;color:#fff;font-weight:700;cursor:pointer;width:100%;margin-top:10px}
 .link{color:var(--orange);cursor:pointer;text-align:center;margin-top:10px;font-size:14px}

  /* APP LAYOUT */
  #app{display:none;height:100vh;width:100vw}
 .sidebar{position:fixed;left:-280px;top:0;width:280px;height:100%;background:var(--card);border-right:1px solid var(--border);transition:0.3s;z-index:20;padding:20px;display:flex;flex-direction:column}
 .sidebar.open{left:0}
 .sidebar h2{background:linear-gradient(90deg,var(--orange),var(--orange-dark));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
 .sidebar input{width:100%;padding:10px;background:#1a1a1a;border:1px solid var(--border);border-radius:8px;color:var(--text);margin:10px 0}
 .chat-history{flex:1;overflow-y:auto}
 .history-item{padding:10px;border-radius:8px;cursor:pointer;margin:4px 0;font-size:14px}
 .history-item:hover{background:#1a1a1a}
 .footer-links{font-size:12px;color:var(--muted)}

 .main{height:100vh;display:flex;flex-direction:column}
 .topbar{padding:15px;display:flex;align-items:center;border-bottom:1px solid var(--border)}
 .menu-btn{font-size:24px;cursor:pointer;margin-right:15px;color:var(--orange)}

  /* WELCOME / CHAT */
 .chat-area{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;align-items:center}
 .welcome{animation:fadeIn 1s;text-align:center;margin-top:10vh}
 .welcome h1{font-size:3rem;background:linear-gradient(90deg,var(--orange),var(--orange-dark));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
 .suggestions{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap;justify-content:center}
 .suggestion{padding:10px 16px;background:var(--card);border:1px solid var(--border);border-radius:20px;cursor:pointer;transition:0.2s}
 .suggestion:hover{border-color:var(--orange)}

 .messages{width:100%;max-width:800px}
 .bubble{padding:14px 18px;border-radius:16px;margin:8px 0;max-width:85%;line-height:1.6}
 .user{align-self:flex-end;background:linear-gradient(90deg,var(--orange),var(--orange-dark))}
 .ai{align-self:flex-start;background:var(--card);border:1px solid var(--border)}

  /* INPUT */
 .input-area{padding:15px;border-top:1px solid var(--border);display:flex;gap:10px;align-items:flex-end;max-width:800px;margin:0 auto;width:100%}
 .input-box{flex:1;background:#1a1a1a;border:1px solid var(--border);border-radius:16px;padding:12px;display:flex;gap:10px}
 .input-box textarea{flex:1;background:transparent;border:none;color:var(--text);resize:none;outline:none;max-height:200px}
 .icon-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:20px}
 .send{background:linear-gradient(90deg,var(--orange),var(--orange-dark));border:none;width:40px;height:40px;border-radius:50%;color:#fff;cursor:pointer}
 .overlay{position:fixed;inset:0;background:#0005;display:none;z-index:10}
 .overlay.show{display:block}
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="authScreen">
  <h1>AURA AI</h1>
  <p id="rotatingText" style="margin:10px 0 20px;color:var(--muted)"></p>
  <div class="auth-box">
    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button class="btn" onclick="login()">Login</button>
    <button class="btn" onclick="signup()">Sign Up</button>
    <div class="link" onclick="resetPassword()">Forgot Password?</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="overlay" id="overlay" onclick="toggleMenu()"></div>
  <div class="sidebar" id="sidebar">
    <h2>AURA AI</h2>
    <button class="btn" onclick="newChat()">+ New Chat</button>
    <input id="searchChat" placeholder="Search chats..." oninput="searchChats()">
    <div class="chat-history" id="chatHistory"></div>
    <div class="footer-links">
      <p>Privacy</p><p>Terms</p><p>About</p>
    </div>
  </div>

  <div class="main" onclick="if(window.innerWidth<900)toggleMenu(false)">
    <div class="topbar">
      <div class="menu-btn" onclick="toggleMenu()">☰</div>
      <h3>AURA AI</h3>
    </div>

    <div class="chat-area" id="chatArea">
      <div class="welcome" id="welcome">
        <h1>Hello</h1>
        <p style="color:var(--muted)">How can I help you today?</p>
        <div class="suggestions" id="suggestions"></div>
      </div>
      <div class="messages" id="messages"></div>
    </div>

    <div class="input-area">
      <div class="input-box">
        <button class="icon-btn" onclick="attachFile()">📎</button>
        <textarea id="chatInput" placeholder="Message AURA AI..." rows="1"></textarea>
      </div>
      <button class="send" onclick="handleMessageSending()">➤</button>
    </div>
  </div>
</div>

<!-- FIREBASE + GEMINI LOGIC -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendPasswordResetEmail, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, doc, setDoc, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// YOUR FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyDTAqb0waoaoSDrwOa2UXRjwl8wmSyXUs0",
  authDomain: "my-wyticle-id.firebaseapp.com",
  projectId: "my-wyticle-id",
  storageBucket: "my-wyticle-id.firebasestorage.app",
  messagingSenderId: "634169882815",
  appId: "1:634169882815:web:486d39a13ce2f855c0ae0a",
  measurementId: "G-7X84RSMH58"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null; let activeChatId = null; let allChats = [];

// ROTATING WELCOME TEXT
const suggestions = ["Explain quantum physics", "Write me a CV", "Plan a trip to Dubai", "Code a website for me"];
const rotating = ["Your AI Assistant", "Fast. Smart. Private.", "Ask me anything"];
let rotIndex=0; setInterval(()=>{document.getElementById('rotatingText').innerText=rotating[rotIndex++%rotating.length]},2000);
document.getElementById('suggestions').innerHTML = suggestions.map(s=>`<div class="suggestion" onclick="fillSuggestion('${s}')">${s}</div>`).join('');

// AUTH
window.login = async()=>{await signInWithEmailAndPassword(auth,email.value,password.value).catch(e=>alert(e.message))}
window.signup = async()=>{await createUserWithEmailAndPassword(auth,email.value,password.value).catch(e=>alert(e.message))}
window.resetPassword = async()=>{await sendPasswordResetEmail(auth,email.value).then(()=>alert("Reset email sent")).catch(e=>alert(e.message))}
onAuthStateChanged(auth,user=>{if(user){currentUser=user;document.getElementById('authScreen').style.display='none';document.getElementById('app').style.display='block';loadChats()}else{document.getElementById('authScreen').style.display='flex';document.getElementById('app').style.display='none'}})

// CHAT LOGIC
window.toggleMenu=(force)=>{const s=document.getElementById('sidebar');const o=document.getElementById('overlay');s.classList.toggle('open',force);o.classList.toggle('show',force)}
window.newChat=()=>{activeChatId=null;document.getElementById('messages').innerHTML='';document.getElementById('welcome').style.display='block';toggleMenu(false)}
window.fillSuggestion=(t)=>{document.getElementById('chatInput').value=t;handleMessageSending()}

async function loadChats(){
  const q=query(collection(db,"users",currentUser.uid,"chats"),orderBy("createdAt","desc"));
  const snap=await getDocs(q); allChats=snap.docs.map(d=>({id:d.id,...d.data()}));
  renderChats(allChats)
}
function renderChats(chats){document.getElementById('chatHistory').innerHTML=chats.map(c=>`<div class="history-item" onclick="openChat('${c.id}')">${c.title}</div>`).join('')}
window.searchChats=()=>{const v=document.getElementById('searchChat').value.toLowerCase();renderChats(allChats.filter(c=>c.title.toLowerCase().includes(v)))}
window.openChat=async(id)=>{activeChatId=id;document.getElementById('welcome').style.display='none';toggleMenu(false) /* load messages here */}

window.handleMessageSending=async()=>{
  const text=document.getElementById('chatInput').value.trim();if(!text)return;
  document.getElementById('chatInput').value='';
  document.getElementById('welcome').style.display='none';
  addBubble('user',text);

  if(!activeChatId){
    activeChatId=`chat_${Date.now()}`;
    await setDoc(doc(db,"users",currentUser.uid,"chats",activeChatId),{title:text.slice(0,40),createdAt:serverTimestamp()});
    loadChats();
  }
  const aiId=addBubble('ai','Thinking...');

  const history=[{role:'user',parts:[{text}]}];
  const res=await fetch('https://aura01-fawn.vercel.app/api/gemini',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:text,history})});
  const data=await res.json();
  document.getElementById(aiId).innerText=data.response;
}

function addBubble(role,text){const id='b'+Date.now();const div=document.createElement('div');div.className=`bubble ${role}`;div.id=id;div.innerText=text;document.getElementById('messages').appendChild(div);return id}
window.attachFile=()=>alert("Attachment pipeline: connect Firebase Storage here")

</script>
</body>
        </html>
