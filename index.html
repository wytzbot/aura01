  <!-- Highlight.js & Marked -->

  <!-- Import Maps for Firebase -->

      "imports": {

        "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",

        "firebase/analytics": "https://www.gstatic.com/firebasejs/10.8.0/firebase-analytics.js"
      }
    }

  <style>
    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .bg-animated {
      background: linear-gradient(-45deg, #000000, #0c0300, #1f0800, #330e00, #000000);
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
    }
    .text-orange-gradient {
      background: linear-gradient(135deg, #ffffff 0%, #FF5500 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    canvas { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 1; }
    .content-zone { position: relative; z-index: 2; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #080808; }
    ::-webkit-scrollbar-thumb { background: #222222; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #FF5500; }
  </style>
</head>
<body class="bg-darkBg text-gray-100 font-sans antialiased h-[100dvh] overflow-hidden flex flex-col select-none">

  <canvas id="particleCanvas"></canvas>

  <!-- Pull To Refresh Visual Indicator -->
  <div id="pullSpinner" class="fixed top-2 left-1/2 -translate-x-1/2 z-50 bg-panelBg border border-orange/30 text-orange p-2 rounded-full shadow-lg opacity-0 pointer-events-none transition-all flex items-center gap-2 text-xs">
    <i data-lucide="rotate-cw" class="w-4 h-4 animate-spin"></i>
    <span>Refreshing app...</span>
  </div>

  <div id="app" class="content-zone flex-1 flex flex-col h-full overflow-hidden">

    <!-- WELCOME PAGE -->
    <section id="welcomePage" class="flex-1 flex flex-col items-center justify-center p-6 text-center bg-animated h-full">
      <div class="max-w-md w-full flex flex-col items-center space-y-8">
        <div class="space-y-3">
          <div class="inline-flex items-center justify-center p-3 bg-orange/10 rounded-2xl border border-orange/20 mb-2">
            <i data-lucide="sparkles" class="w-10 h-10 text-orange"></i>
          </div>
          <h1 class="text-5xl font-black tracking-tight text-orange-gradient">AURA</h1>
          <p id="rotatingText" class="text-gray-400 font-medium text-lg transition-opacity duration-500">Your Coding Partner</p>
        </div>
        <div class="w-full space-y-3 pt-4">
          <button id="btnStartCoding" class="w-full py-4 px-6 bg-orange text-black font-bold rounded-xl shadow-lg hover:bg-orange/90 transition cursor-pointer flex items-center justify-center gap-2">

          <button onclick="skipLogin()" class="w-full py-3 px-6 bg-panelBg border border-orange/40 text-orange font-semibold rounded-xl hover:bg-orange/10 transition cursor-pointer text-xs flex items-center justify-center gap-2">
            <span>⚡ Skip Login & Test AURA Instantly</span>

    <!-- AUTH PAGE -->
    <section id="authPage" class="hidden flex-1 flex flex-col items-center justify-center p-4 bg-darkBg h-full overflow-y-auto">
      <div class="w-full max-w-md bg-panelBg border border-borderDark rounded-2xl p-6 sm:p-8 shadow-2xl relative my-auto">
        <button id="btnBackToWelcome" class="absolute top-6 left-6 text-gray-400 hover:text-white cursor-pointer"><i data-lucide="chevron-left" class="w-6 h-6"></i></button>

        </div>

        <button id="btnGoogleAuth" class="w-full py-3 px-4 bg-darkBg border border-borderDark hover:border-gray-700 rounded-xl text-sm font-medium text-gray-200 flex items-center justify-center gap-3 transition cursor-pointer mb-5">

            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z"/>
          </svg>
          Continue with Google
        </button>
        
        <div class="flex items-center my-4">

          <span class="px-3 text-xs text-gray-500 uppercase">Or email</span>

        </div>

        <form id="authForm" class="space-y-4">
          <div>
            <label class="text-xs font-medium text-gray-400">Email Address</label>

          </div>

            <input type="password" id="inputPassword" required placeholder="••••••••" class="w-full bg-darkBg border border-borderDark rounded-xl px-4 py-2.5 text-sm text-white focus:outline-none focus:border-orange mt-1">
          </div>

          </div>
          <div class="flex justify-between items-center">
            <button type="button" onclick="skipLogin()" class="text-xs text-orange hover:underline cursor-pointer">⚡ Bypass Error / Skip</button>
            <button type="button" id="btnForgotPassword" class="text-xs text-gray-400 hover:underline cursor-pointer">Forgot Password?</button>

          <div id="authError" class="text-xs text-red-400 hidden bg-red-950/30 p-2.5 rounded-lg border border-red-800/40"></div>
          <button type="submit" id="btnAuthSubmit" class="w-full py-3 bg-orange text-black font-bold rounded-xl hover:bg-orange/90 transition cursor-pointer text-sm">Sign Up</button>

        <div class="text-center mt-6 flex flex-col gap-2">
          <button id="btnToggleAuthMode" class="text-xs text-gray-400 hover:text-white cursor-pointer">
            Already have an account? <span class="text-orange font-medium">Log In</span>
          </button>
          <button onclick="skipLogin()" class="text-xs text-orange font-semibold hover:underline cursor-pointer pt-2">
            🚀 Skip & Use App Instantly

        </div>
      </div>
    </section>

    <!-- CHAT PAGE -->
    <section id="chatPage" class="hidden flex-1 flex h-full overflow-hidden bg-darkBg relative">
      <div id="sidebarOverlay" class="fixed inset-0 bg-black/60 z-30 opacity-0 pointer-events-none transition-opacity md:hidden"></div>

      <!-- Collapsible Sidebar -->
      <aside id="sidebar" class="fixed md:static inset-y-0 left-0 w-72 bg-panelBg border-r border-borderDark z-40 transform -translate-x-full md:translate-x-0 transition-transform duration-300 flex flex-col h-full">
        <div class="p-4 border-b border-borderDark flex items-center justify-between">
          <div class="flex items-center gap-2"><i data-lucide="sparkles" class="w-5 h-5 text-orange"></i><span class="font-bold text-white">AURA AI</span></div>
          <div class="flex items-center gap-1">
            <button id="btnNewChat" class="p-2 text-orange border border-orange/20 rounded-lg text-xs font-semibold hover:bg-darkBg cursor-pointer flex items-center gap-1"><i data-lucide="plus" class="w-4 h-4"></i> New</button>
            <button id="btnCloseSidebar" class="p-2 text-gray-400 hover:text-white md:hidden cursor-pointer"><i data-lucide="x" class="w-5 h-5"></i></button>
          </div>
        </div>
        <div id="chatHistoryList" class="flex-1 overflow-y-auto px-3 space-y-1 py-2"></div>
        <div class="p-4 border-t border-borderDark flex items-center justify-between bg-darkBg/50">
          <div class="flex items-center gap-2 overflow-hidden">
            <div id="userAvatar" class="w-8 h-8 rounded-full bg-orange/20 border border-orange/40 text-orange flex items-center justify-center font-bold text-xs uppercase">U</div>
            <span id="userEmailDisplay" class="text-xs text-gray-300 truncate">user@aura.ai</span>
          </div>
          <button id="btnLogout" class="p-2 text-gray-400 hover:text-red-400 rounded-lg cursor-pointer" title="Log Out"><i data-lucide="log-out" class="w-4 h-4"></i></button>
        </div>
      </aside>

      <!-- Main Chat Area -->
      <main class="flex-1 flex flex-col h-full relative overflow-hidden bg-darkBg">
        <header class="h-14 border-b border-borderDark flex items-center justify-between px-4 bg-panelBg/80 shrink-0 z-10">
          <button id="btnToggleSidebar" class="p-2 text-gray-300 hover:text-white rounded-lg cursor-pointer"><i data-lucide="menu" class="w-5 h-5"></i></button>
          <span class="text-xs font-semibold text-gray-300 bg-darkBg px-3.5 py-1.5 rounded-full border border-orange/30 flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-orange animate-pulse"></span>AURA AI</span>
          <button id="btnHeaderNewChat" class="p-2 text-gray-300 hover:text-white rounded-lg cursor-pointer"><i data-lucide="square-pen" class="w-5 h-5"></i></button>
        </header>

        <div id="emptyGreeting" class="flex-1 flex flex-col items-center justify-center p-6 text-center">
          <div class="p-4 bg-orange/5 rounded-full border border-orange/10 mb-4"><i data-lucide="code-2" class="w-8 h-8 text-orange"></i></div>
          <h2 id="rotatingGreet" class="text-2xl font-bold text-white mb-2 transition-opacity duration-500">Welcome back, legend! 🚀</h2>
          <p class="text-gray-400 text-sm max-w-sm">Ask a question, upload photos, or attach code files to begin.</p>
        </div>

        <div id="messagesContainer" class="hidden flex-1 overflow-y-auto p-4 space-y-6"></div>

        <!-- Input Bar -->
        <div class="shrink-0 p-3 bg-black border-t border-orange/40 z-20 w-full pb-safe">
          <div class="max-w-3xl mx-auto">
            
            <!-- Thumbnail Preview Bar -->
            <div id="attachmentPreview" class="hidden mb-2 p-2 bg-panelBg border border-orange rounded-xl flex items-center justify-between gap-2 text-xs text-gray-300">
              <div class="flex items-center gap-2 overflow-hidden">
                <img id="imgPreviewThumb" class="w-12 h-12 object-cover rounded-lg border border-orange hidden" alt="Preview">
                <i id="previewFileIcon" data-lucide="file-text" class="w-5 h-5 text-orange hidden shrink-0"></i>
                <span id="attachmentName" class="truncate font-medium text-white">filename.txt</span>
              </div>
              <button id="btnRemoveAttachment" class="text-gray-400 hover:text-red-400 p-1 cursor-pointer"><i data-lucide="x" class="w-4 h-4"></i></button>
            </div>

            <!-- Solid Black Input Container Box -->
            <div style="background-color: #000000 !important; border: 1.5px solid #FF5500 !important;" class="rounded-2xl p-2 shadow-xl">
              <textarea id="chatInput" rows="1" placeholder="Ask AURA anything..." style="background-color: #000000 !important; color: #ffffff !important;" class="w-full px-3 py-2 text-sm focus:outline-none resize-none max-h-32 min-h-[40px]"></textarea>
              
              <div class="flex items-center justify-between pt-2 px-1 border-t border-gray-800">
                <div class="flex items-center gap-1">
                  <input type="file" id="fileAttach" accept="image/*,text/*,.js,.jsx,.py,.html,.css,.json,.ts,.tsx" class="hidden">
                  <button id="btnAttach" class="p-2 text-gray-400 hover:text-orange hover:bg-panelBg rounded-lg transition cursor-pointer" title="Attach file or image"><i data-lucide="paperclip" class="w-4 h-4"></i></button>
                </div>

                <button id="btnSend" class="p-2.5 bg-orange text-black font-bold rounded-xl hover:bg-orange/90 transition cursor-pointer"><i data-lucide="send" class="w-4 h-4"></i></button>
              </div>
            </div>
            
          </div>
        </div>

      </main>
    </section>
  </div>

  <script type="module">
    import { initializeApp, getApps } from "firebase/app";
    import { 
      getAuth, 
      createUserWithEmailAndPassword, 
      signInWithEmailAndPassword, 
      signOut, 
      onAuthStateChanged, 
      sendPasswordResetEmail,
      GoogleAuthProvider,
      signInWithPopup,
      setPersistence, 
      browserLocalPersistence 
    } from "firebase/auth";
    import { getFirestore, doc, setDoc, onSnapshot } from "firebase/firestore";
    import { getAnalytics, isSupported } from "firebase/analytics";

    const firebaseConfig = {
      apiKey: "AIzaSyDTAqb0waoaoSDrwOa2UXRjwl8wmSyXUs0",
      authDomain: "my-wyticle-id.firebaseapp.com",
      projectId: "my-wyticle-id",
      storageBucket: "my-wyticle-id.appspot.com",
      messagingSenderId: "634169882815",
      appId: "1:634169882815:web:486d39a13ce2f855c0ae0a",
      measurementId: "G-7X84RSMH58"
    };

    let app, auth, db, googleProvider;
    try {
      app = !getApps().length ? initializeApp(firebaseConfig) : getApps()[0];
      auth = getAuth(app);
      setPersistence(auth, browserLocalPersistence).catch(err => console.warn(err));
      db = getFirestore(app);
      googleProvider = new GoogleAuthProvider();
      isSupported().then((supported) => { if (supported) getAnalytics(app); });
    } catch(e) {
      console.warn("Firebase offline mode enabled.");
    }

    const API_BACKEND_URL = "https://aura01-fawn.vercel.app/api/chat";

    window.skipLogin = function() {
      localStorage.setItem('aura_skipped_auth', 'true');
      currentUser = { email: 'developer@aura.ai', uid: 'guest_dev' };
      const wp = document.getElementById('welcomePage');
      const ap = document.getElementById('authPage');
      const cp = document.getElementById('chatPage');
      if (wp) wp.classList.add('hidden');
      if (ap) ap.classList.add('hidden');
      if (cp) cp.classList.remove('hidden');
      loadChats();
    }

    let currentUser = null, authIsSignUp = true, chats = [], currentChatId = null, attachmentData = null;

    const welcomePage = document.getElementById('welcomePage');
    const authPage = document.getElementById('authPage');
    const chatPage = document.getElementById('chatPage');
    const sidebar = document.getElementById('sidebar');
    const sidebarOverlay = document.getElementById('sidebarOverlay');
    const chatInput = document.getElementById('chatInput');
    const btnSend = document.getElementById('btnSend');
    const messagesContainer = document.getElementById('messagesContainer');
    const emptyGreeting = document.getElementById('emptyGreeting');
    const chatHistoryList = document.getElementById('chatHistoryList');

    if (window.lucide) lucide.createIcons();

    // Pull to Refresh Logic
    let touchStartY = 0;
    const pullSpinner = document.getElementById('pullSpinner');

    window.addEventListener('touchstart', (e) => {
      if (messagesContainer && messagesContainer.scrollTop === 0) touchStartY = e.touches[0].clientY;
    }, { passive: true });

    window.addEventListener('touchmove', (e) => {
      if (messagesContainer && messagesContainer.scrollTop === 0 && pullSpinner) {
        const pullDist = e.touches[0].clientY - touchStartY;
        if (pullDist > 0 && pullDist < 120) {
          pullSpinner.style.opacity = `${pullDist / 120}`;
          pullSpinner.style.transform = `translate(-50%, ${pullDist / 2}px)`;
        }
      }
    }, { passive: true });

    window.addEventListener('touchend', (e) => {
      if (messagesContainer && messagesContainer.scrollTop === 0 && (e.changedTouches[0].clientY - touchStartY) > 90) {
        if (pullSpinner) pullSpinner.style.opacity = '1';
        setTimeout(() => location.reload(), 400);
      } else if (pullSpinner) {
        pullSpinner.style.opacity = '0';
        pullSpinner.style.transform = 'translate(-50%, 0px)';
      }
      touchStartY = 0;
    });

    // Canvas Particles
    const canvas = document.getElementById('particleCanvas');
    if (canvas) {
      const ctx = canvas.getContext('2d');
      let particles = [];
      function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
      window.addEventListener('resize', resizeCanvas);
      resizeCanvas();

      class Particle {
        constructor() { this.reset(); }
        reset() {
          this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height;
          this.size = Math.random() * 2 + 1; this.speedX = (Math.random() - 0.5) * 0.5;
          this.speedY = (Math.random() - 0.5) * 0.5; this.alpha = Math.random() * 0.5 + 0.2;
        }
        update() {
          this.x += this.speedX; this.y += this.speedY;
          if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.reset();
        }
        draw() {
          ctx.fillStyle = `rgba(255, 85, 0, ${this.alpha})`;
          ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
        }
      }
      for (let i = 0; i < 40; i++) particles.push(new Particle());
      function animateParticles() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(animateParticles);
      }
      animateParticles();
    }

    // Auth & Navigation bindings
    function showPage(page) {
      if (welcomePage) welcomePage.classList.add('hidden');
      if (authPage) authPage.classList.add('hidden');
      if (chatPage) chatPage.classList.add('hidden');
      if (page) page.classList.remove('hidden');
    }

    const btnStartCoding = document.getElementById('btnStartCoding');
    if (btnStartCoding) btnStartCoding.onclick = () => { setAuthMode(true); showPage(authPage); };

    const btnWelcomeLogin = document.getElementById('btnWelcomeLogin');
    if (btnWelcomeLogin) btnWelcomeLogin.onclick = () => { setAuthMode(false); showPage(authPage); };

    const btnBackToWelcome = document.getElementById('btnBackToWelcome');
    if (btnBackToWelcome) btnBackToWelcome.onclick = () => showPage(welcomePage);

    function setAuthMode(isSignUp) {
      authIsSignUp = isSignUp;
      const t = document.getElementById('authTitle');
      const sub = document.getElementById('authSubtitle');
      const conf = document.getElementById('fieldConfirmPass');
      const subBtn = document.getElementById('btnAuthSubmit');
      const toggle = document.getElementById('btnToggleAuthMode');
      const err = document.getElementById('authError');

      if (t) t.textContent = isSignUp ? "Create Account" : "Welcome Back";
      if (sub) sub.textContent = isSignUp ? "Join AURA to save your chat history" : "Log in to access your chat history";
      if (conf) conf.style.display = isSignUp ? 'block' : 'none';
      if (subBtn) subBtn.textContent = isSignUp ? "Sign Up" : "Log In";
      if (toggle) toggle.innerHTML = isSignUp 
        ? 'Already have an account? <span class="text-orange font-medium">Log In</span>'
        : 'Need an account? <span class="text-orange font-medium">Sign Up</span>';
      if (err) err.classList.add('hidden');
    }

    const btnToggleAuthMode = document.getElementById('btnToggleAuthMode');
    if (btnToggleAuthMode) btnToggleAuthMode.onclick = () => setAuthMode(!authIsSignUp);

    const authForm = document.getElementById('authForm');
    if (authForm) {
      authForm.onsubmit = async (e) => {
        e.preventDefault();
        if (!auth) { skipLogin(); return; }
        const email = document.getElementById('inputEmail').value.trim();
        const password = document.getElementById('inputPassword').value;
        const errorEl = document.getElementById('authError');
        if (errorEl) errorEl.classList.add('hidden');

        try {
          if (authIsSignUp) {
            const confirmPass = document.getElementById('inputConfirmPassword').value;
            if (password !== confirmPass) throw new Error("Passwords do not match");
            await createUserWithEmailAndPassword(auth, email, password);
          } else {
            await signInWithEmailAndPassword(auth, email, password);
          }
        } catch (err) {
          if (errorEl) {
            errorEl.textContent = err.message || "Authentication failed.";
            errorEl.classList.remove('hidden');
          }
        }
      };
    }

    const btnGoogleAuth = document.getElementById('btnGoogleAuth');
    if (btnGoogleAuth) {
      btnGoogleAuth.onclick = async () => {
        if (!auth) { skipLogin(); return; }
        const errorEl = document.getElementById('authError');
        if (errorEl) errorEl.classList.add('hidden');
        try {
          await signInWithPopup(auth, googleProvider);
        } catch (err) {
          if (errorEl) {
            errorEl.textContent = err.message || "Google sign-in failed.";
            errorEl.classList.remove('hidden');
          }
        }
      };
    }

    const btnForgotPassword = document.getElementById('btnForgotPassword');
    if (btnForgotPassword) {
      btnForgotPassword.onclick = async () => {
        const email = prompt("Enter your email address to reset password:");
        if (email && auth) {
          try {
            await sendPasswordResetEmail(auth, email.trim());
            alert("Password reset email sent!");
          } catch (err) { alert("Error: " + err.message); }
        }
      };
    }

    const btnLogout = document.getElementById('btnLogout');
    if (btnLogout) {
      btnLogout.onclick = () => {
        localStorage.removeItem('aura_skipped_auth');
        if (auth) signOut(auth);
        location.reload();
      };
    }

    // Sidebar Toggles
    function openSidebar() { if (sidebar) sidebar.classList.remove('-translate-x-full'); if (sidebarOverlay) sidebarOverlay.classList.remove('opacity-0', 'pointer-events-none'); }
    function closeSidebar() { if (sidebar) sidebar.classList.add('-translate-x-full'); if (sidebarOverlay) sidebarOverlay.classList.add('opacity-0', 'pointer-events-none'); }
    
    const btnToggleSidebar = document.getElementById('btnToggleSidebar');
    if (btnToggleSidebar) btnToggleSidebar.onclick = () => sidebar && sidebar.classList.contains('-translate-x-full') ? openSidebar() : closeSidebar();
    
    const btnCloseSidebar = document.getElementById('btnCloseSidebar');
    if (btnCloseSidebar) btnCloseSidebar.onclick = closeSidebar;
    
    if (sidebarOverlay) sidebarOverlay.onclick = closeSidebar;

    const btnNewChat = document.getElementById('btnNewChat');
    if (btnNewChat) btnNewChat.onclick = createNewChat;

    const btnHeaderNewChat = document.getElementById('btnHeaderNewChat');
    if (btnHeaderNewChat) btnHeaderNewChat.onclick = createNewChat;

    function createNewChat() {
      currentChatId = Date.now().toString();
      chats.unshift({ id: currentChatId, title: "New Conversation", messages: [] });
      saveChats(); renderChatHistory(); selectChat(currentChatId);
      if (window.innerWidth < 768) closeSidebar();
    }

    function saveChats() {
      if (!currentUser) return;
      localStorage.setItem(`aura_chats_${currentUser.uid}`, JSON.stringify(chats));
      if (currentUser.uid !== 'guest_dev' && db) {
        setDoc(doc(db, "users", currentUser.uid), { chats: chats }, { merge: true }).catch(err => console.warn(err));
      }
    }

    async function loadChats() {
      if (!currentUser) return;
      const local = localStorage.getItem(`aura_chats_${currentUser.uid}`);
      if (local) { try { chats = JSON.parse(local); renderChatHistory(); } catch (e) { chats = []; } }
      if (chats.length === 0) createNewChat();
      else selectChat(chats[0].id);

      if (currentUser.uid !== 'guest_dev' && db) {
        onSnapshot(doc(db, "users", currentUser.uid), (docSnap) => {
          if (docSnap.exists() && docSnap.data().chats) {
            chats = docSnap.data().chats;
            localStorage.setItem(`aura_chats_${currentUser.uid}`, JSON.stringify(chats));
            renderChatHistory(); if (currentChatId) renderMessages();
          }
        });
      }
    }

    function renderChatHistory() {
      if (!chatHistoryList) return;
      chatHistoryList.innerHTML = "";
      chats.forEach(chat => {
        const item = document.createElement('div');
        const isActive = chat.id === currentChatId;
        item.className = `p-2.5 rounded-xl text-xs cursor-pointer flex items-center justify-between transition ${isActive ? 'bg-orange/10 text-orange border border-orange/20' : 'text-gray-300 hover:bg-darkBg'}`;
        item.innerHTML = `<span class="truncate">${chat.title}</span>`;
        item.onclick = () => { selectChat(chat.id); if (window.innerWidth < 768) closeSidebar(); };
        chatHistoryList.appendChild(item);
      });
    }

    function selectChat(id) { currentChatId = id; renderChatHistory(); renderMessages(); }

    function renderMessages() {
      if (!messagesContainer || !emptyGreeting) return;
      const activeChat = chats.find(c => c.id === currentChatId);
      if (!activeChat || activeChat.messages.length === 0) {
        emptyGreeting.classList.remove('hidden'); messagesContainer.classList.add('hidden'); messagesContainer.innerHTML = ''; return;
      }
      emptyGreeting.classList.add('hidden'); messagesContainer.classList.remove('hidden');
      messagesContainer.innerHTML = '';
      activeChat.messages.forEach((msg, idx) => messagesContainer.appendChild(createMessageElement(msg, idx)));
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
      if (window.lucide) lucide.createIcons();
    }

    function createMessageElement(msg, index) {
      const isUser = msg.role === 'user';
      const wrapper = document.createElement('div');
      wrapper.className = `group flex flex-col ${isUser ? 'items-end' : 'items-start'} space-y-1 relative mb-4`;

      const contentDiv = document.createElement('div');
      if (isUser) {
        contentDiv.className = `max-w-[90%] sm:max-w-[80%] rounded-2xl rounded-tr-none p-4 text-sm leading-relaxed shadow-lg`;
        contentDiv.style.backgroundColor = '#000000';
        contentDiv.style.color = '#ffffff';
        contentDiv.style.border = '1.5px solid #FF5500';
      } else {
        contentDiv.className = `max-w-[90%] sm:max-w-[80%] rounded-2xl rounded-tl-none p-4 text-sm leading-relaxed bg-panelBg border border-borderDark text-gray-100 shadow-lg`;
      }

      if (isUser) {
        if (msg.attachment && msg.attachment.isImage && msg.attachment.data) {
          const img = document.createElement('img');
          img.src = msg.attachment.data;
          img.className = "max-w-full max-h-56 rounded-xl mb-2 object-cover border border-orange/40 shadow";
          contentDiv.appendChild(img);
        }
        if (msg.attachment && !msg.attachment.isImage && msg.attachment.name) {
          const fileCard = document.createElement('div');
          fileCard.className = "mb-2 p-2 bg-black/60 border border-orange/40 rounded-xl flex items-center gap-2 text-xs font-mono text-orange";
          fileCard.innerHTML = `<i data-lucide="file-code" class="w-4 h-4 shrink-0"></i><span class="truncate">${msg.attachment.name}</span>`;
          contentDiv.appendChild(fileCard);
        }
        if (msg.content) {
          const p = document.createElement('p'); p.textContent = msg.content; contentDiv.appendChild(p);
        }
      } else {
        contentDiv.innerHTML = parseMarkdown(msg.content);
      }

      const menu = document.createElement('div');
      menu.className = "absolute z-30 hidden bg-panelBg border border-orange/40 rounded-xl shadow-2xl p-1.5 flex gap-2 text-xs -top-8 " + (isUser ? "right-0" : "left-0");
      menu.innerHTML = `
        <button onclick="editMessage(${index})" class="hover:text-orange px-2 py-1 flex items-center gap-1 cursor-pointer"><i data-lucide="edit-3" class="w-3.5 h-3.5"></i> Edit</button>
        <button onclick="copyMessage('${btoa(encodeURIComponent(msg.content || ''))}')" class="hover:text-orange px-2 py-1 flex items-center gap-1 cursor-pointer"><i data-lucide="copy" class="w-3.5 h-3.5"></i> Copy</button>
        <button onclick="regenerateMessage(${index})" class="hover:text-orange px-2 py-1 flex items-center gap-1 cursor-pointer"><i data-lucide="refresh-cw" class="w-3.5 h-3.5"></i> Regenerate</button>
        <button onclick="deleteMessage(${index})" class="text-red-400 hover:text-red-300 px-2 py-1 flex items-center gap-1 cursor-pointer"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i> Delete</button>
      `;

      let timer;
      const showMenu = (e) => {
        e.preventDefault();
        document.querySelectorAll('.absolute.z-30').forEach(m => m.classList.add('hidden'));
        menu.classList.remove('hidden');
      };

      contentDiv.addEventListener('touchstart', () => { timer = setTimeout(showMenu, 500); });
      contentDiv.addEventListener('touchend', () => clearTimeout(timer));
      contentDiv.addEventListener('touchmove', () => clearTimeout(timer));
      contentDiv.addEventListener('contextmenu', showMenu);

      wrapper.appendChild(contentDiv);
      wrapper.appendChild(menu);
      return wrapper;
    }

    function parseMarkdown(text) {
      if (!window.marked) return text || "";
      const rawHtml = marked.parse(text || "");
      const temp = document.createElement('div');
      temp.innerHTML = rawHtml;

      temp.querySelectorAll('pre code').forEach((codeEl) => {
        const langClass = Array.from(codeEl.classList).find(c => c.startsWith('language-'));
        const lang = langClass ? langClass.replace('language-', '') : 'text';
        const rawCode = (codeEl.innerText || codeEl.textContent).replace(/\\n/g, '\n').replace(/\\`/g, '`');

        if (window.hljs) hljs.highlightElement(codeEl);

        const pre = codeEl.parentElement;
        const container = document.createElement('div');
        container.className = "my-3 rounded-lg overflow-hidden border border-gray-700 bg-[#1e1e1e] text-left";

        const header = document.createElement('div');
        header.className = "flex items-center justify-between px-4 py-2 bg-[#2d2d2d] border-b border-gray-700 text-xs font-mono";
        
        const copyBtnId = 'copy_btn_' + Math.random().toString(36).substr(2, 9);
        const downloadBtnId = 'dl_btn_' + Math.random().toString(36).substr(2, 9);

        header.innerHTML = `
          <span class="text-orange-400 uppercase">${lang}</span>
          <div class="flex gap-2">
            <button id="${copyBtnId}" class="flex items-center gap-1 px-3 py-1 text-xs bg-gray-700 hover:bg-gray-600 text-white rounded transition cursor-pointer">Copy</button>
            <button id="${downloadBtnId}" class="flex items-center gap-1 px-3 py-1 text-xs bg-orange-600 hover:bg-orange-500 text-white rounded transition cursor-pointer">Download</button>
          </div>
        `;

        container.appendChild(header);
        pre.parentNode.insertBefore(container, pre);
        container.appendChild(pre);

        setTimeout(() => {
          const cBtn = document.getElementById(copyBtnId);
          if (cBtn) {
            cBtn.onclick = async () => {
              try {
                await navigator.clipboard.writeText(rawCode);
                cBtn.textContent = "Copied!";
                setTimeout(() => { cBtn.textContent = "Copy"; }, 2000);
              } catch (err) { alert("Copy failed."); }
            };
          }

          const dBtn = document.getElementById(downloadBtnId);
          if (dBtn) {
            dBtn.onclick = () => {
              const extMap = { javascript: 'js', js: 'js', jsx: 'jsx', python: 'py', html: 'html', css: 'css', json: 'json', ts: 'ts', text: 'txt' };
              const ext = extMap[lang.toLowerCase()] || 'txt';
              const blob = new Blob([rawCode], { type: "text/plain;charset=utf-8" });
              const url = URL.createObjectURL(blob);
              const link = document.createElement("a");
              link.href = url; link.download = `code_snippet.${ext}`;
              document.body.appendChild(link); link.click();
              document.body.removeChild(link);
              URL.revokeObjectURL(url);
            };
          }
        }, 0);
      });

      return temp.innerHTML;
    }

    window.copyMessage = function(b64) {
      const text = decodeURIComponent(decodeURIComponent(escape(atob(b64))));
      navigator.clipboard.writeText(text);
      alert("Copied to clipboard!");
    }

    window.deleteMessage = function(index) {
      const activeChat = chats.find(c => c.id === currentChatId);
      if (!activeChat) return;
      activeChat.messages = activeChat.messages.slice(0, index);
      saveChats(); renderMessages();
    }

    window.regenerateMessage = function(index) {
      const activeChat = chats.find(c => c.id === currentChatId);
      if (!activeChat) return;
      activeChat.messages = activeChat.messages.slice(0, index);
      saveChats(); renderMessages();
      sendPromptToAI();
    }

    window.editMessage = function(index) {
      const activeChat = chats.find(c => c.id === currentChatId);
      if (!activeChat) return;
      const newText = prompt("Edit message:", activeChat.messages[index].content);
      if (newText !== null) {
        activeChat.messages = activeChat.messages.slice(0, index);
        activeChat.messages.push({ role: 'user', content: newText });
        saveChats(); renderMessages(); sendPromptToAI();
      }
    }

    // Attachment Pipeline
    const btnAttach = document.getElementById('btnAttach');
    const fileAttach = document.getElementById('fileAttach');
    if (btnAttach && fileAttach) {
      btnAttach.onclick = () => fileAttach.click();
      fileAttach.onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const isImage = file.type.startsWith('image/');
        const reader = new FileReader();

        if (isImage) {
          reader.onload = (event) => {
            attachmentData = { name: file.name, mimeType: file.type, data: event.target.result, isImage: true };
            const thumb = document.getElementById('imgPreviewThumb');
            if (thumb) { thumb.src = event.target.result; thumb.classList.remove('hidden'); }
            const pIcon = document.getElementById('previewFileIcon');
            if (pIcon) pIcon.classList.add('hidden');
            const aName = document.getElementById('attachmentName');
            if (aName) aName.textContent = file.name;
            const aPrev = document.getElementById('attachmentPreview');
            if (aPrev) aPrev.classList.remove('hidden');
          };
          reader.readAsDataURL(file);
        } else {
          reader.onload = (event) => {
            attachmentData = { name: file.name, content: event.target.result, isImage: false };
            const thumb = document.getElementById('imgPreviewThumb');
            if (thumb) thumb.classList.add('hidden');
            const pIcon = document.getElementById('previewFileIcon');
            if (pIcon) pIcon.classList.remove('hidden');
            const aName = document.getElementById('attachmentName');
            if (aName) aName.textContent = file.name;
            const aPrev = document.getElementById('attachmentPreview');
            if (aPrev) aPrev.classList.remove('hidden');
            if (window.lucide) lucide.createIcons();
          };
          reader.readAsText(file);
        }
      };
    }

    const btnRemoveAttachment = document.getElementById('btnRemoveAttachment');
    if (btnRemoveAttachment) {
      btnRemoveAttachment.onclick = () => {
        attachmentData = null; 
        if (fileAttach) fileAttach.value = "";
        const aPrev = document.getElementById('attachmentPreview');
        if (aPrev) aPrev.classList.add('hidden');
      };
    }

    if (chatInput) {
      chatInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSendMessage(); }
      });
    }

    if (btnSend) btnSend.onclick = handleSendMessage;

    function handleSendMessage() {
      if (!chatInput) return;
      let promptText = chatInput.value.trim();
      if (!promptText && !attachmentData) return;
      const currentAttachment = attachmentData;

      attachmentData = null;
      if (fileAttach) fileAttach.value = "";
      const aPrev = document.getElementById('attachmentPreview');
      if (aPrev) aPrev.classList.add('hidden');
      chatInput.value = "";

      const activeChat = chats.find(c => c.id === currentChatId);
      if (!activeChat) return;
      if (activeChat.messages.length === 0) {
        activeChat.title = (promptText || "Media Attachment").slice(0, 30) + "...";
      }

      activeChat.messages.push({ role: 'user', content: promptText, attachment: currentAttachment });
      saveChats(); renderChatHistory(); renderMessages(); sendPromptToAI();
    }

    async function sendPromptToAI() {
      const activeChat = chats.find(c => c.id === currentChatId);
      if (!activeChat) return;
      const lastUserMsg = activeChat.messages[activeChat.messages.length - 1];

      const aiMessageObj = { role: 'assistant', content: "Analyzing your request right now... 💬✨" };
      activeChat.messages.push(aiMessageObj);
      renderMessages();
      if (btnSend) btnSend.disabled = true;

      try {
        const response = await fetch("https://aura01-fawn.vercel.app", {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            messages: activeChat.messages.slice(0, -1).map(m => ({ role: m.role, content: m.content })),
            prompt: lastUserMsg?.content || "",
            attachment: lastUserMsg?.attachment || null
          })
        });

        const data = await response.json();
        if (!response.ok) throw new Error(data.text || "Server error");
        aiMessageObj.content = data.text || "Got it! 🤝";
      } catch (err) {
        aiMessageObj.content = `⚠️ Connection Notice: Could not reach backend server at ${API_BACKEND_URL}. (Error: ${err.message})`;
      } finally {
        if (btnSend) btnSend.disabled = false; 
        saveChats(); 
        renderMessages();
      }
    }

    if (auth) {
      onAuthStateChanged(auth, (user) => {
        const skippedAuth = localStorage.getItem('aura_skipped_auth') === 'true';
        currentUser = user || (skippedAuth ? { email: 'developer@aura.ai', uid: 'guest_dev' } : null);

        if (currentUser) {
          const ed = document.getElementById('userEmailDisplay');
          if (ed) ed.textContent = currentUser.email || 'User';
          const ua = document.getElementById('userAvatar');
          if (ua) ua.textContent = (currentUser.email || 'U').charAt(0).toUpperCase();
          showPage(chatPage); loadChats();
        } else {
          if (welcomePage && !welcomePage.classList.contains('hidden') || chatPage && !chatPage.classList.contains('hidden')) showPage(welcomePage);
        }
      });
    } else {
      skipLogin();
    }
  </script>
</body>
</html>
