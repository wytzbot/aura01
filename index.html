<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURA AI</title>
<style>
:root{ --bg:#030303; --text:#F5F5F5; --orange:#FF7A00; --orange-dark:#FF4500; --border:#1a1a1a; }
*{margin:0;padding:0;box-sizing:border-box;font-family:"Inter",sans-serif}
html,body{height:100%;background:var(--bg);color:var(--text)}
#authScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;padding:20px}
#authScreen h1{background:linear-gradient(90deg,var(--orange),var(--orange-dark));-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-size:3rem}
.auth-box{background:rgba(17,17,17,0.8);padding:30px;border-radius:20px;width:100%;max-width:420px;border:1px solid var(--border)}
.auth-box input{width:100%;padding:14px;margin:10px 0;background:#1a1a1a;border:1px solid var(--border);border-radius:10px;color:var(--text)}
.btn{background:linear-gradient(90deg,var(--orange),var(--orange-dark));border:none;padding:14px;border-radius:10px;color:#fff;font-weight:800;cursor:pointer;width:100%;margin-top:12px}
#app{display:none;height:100vh;flex-direction:column}
.topbar{padding:15px 20px;border-bottom:1px solid var(--border)}
.chat-area{flex:1;overflow-y:auto;padding:20px 20px 120px 20px}
.welcome{text-align:center;margin-top:8vh}
.messages{display:flex;flex-direction:column}
.bubble{padding:16px 20px;border-radius:18px;margin:10px 0;max-width:85%;white-space:pre-wrap}
.user{align-self:flex-end;background:linear-gradient(135deg,var(--orange),var(--orange-dark))}
.ai{align-self:flex-start;background:rgba(17,17,17,0.8);border:1px solid var(--border)}
.input-area{padding:12px 15px;border-top:1px solid var(--border);display:flex;gap:10px;position:fixed;bottom:0;left:0;right:0;background:rgba(3,3,3,0.95)}
.input-box{flex:1;background:#1a1a1a;border:1px solid var(--border);border-radius:20px;padding:8px 12px;display:flex}
.input-box textarea{flex:1;background:transparent;border:none;color:var(--text);resize:none;outline:none}
.send{background:linear-gradient(135deg,var(--orange),var(--orange-dark));border:none;width:42px;height:42px;border-radius:50%;color:#fff;cursor:pointer}
</style>
</head>
<body>
<div id="authScreen"><h1>AURA AI</h1>
  <div class="auth-box">
    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button class="btn" onclick="login()">Login</button>
    <button class="btn" onclick="signup()">Sign Up</button>
  </div>
</div>

<div id="app">
  <div class="topbar"><h3>AURA AI</h3></div>
  <div class="chat-area" id="chatArea">
    <div class="welcome" id="welcome"><h1>Hello</h1></div>
    <div class="messages" id="messages"></div>
  </div>
  <div class="input-area">
    <div class="input-box"><textarea id="chatInput" placeholder="Message AURA AI..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();handleMessageSending()}"></textarea></div>
    <button class="send" onclick="handleMessageSending()">➤</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const GEMINI_API_KEY = "AIzaSyAF4LXEdJ3P3I9tVMIRgX0-Mlr8ali8fcU";
const PROXY_URL = "https://corsproxy.io/?";

const firebaseConfig = {apiKey: "AIzaSyDTAqb0waoaoSDrwOa2UXRjwl8wmSyXUs0", authDomain: "my-wyticle-id.firebaseapp.com", projectId: "my-wyticle-id"};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
onAuthStateChanged(auth,user=>{if(user){document.getElementById('authScreen').style.display='none';document.getElementById('app').style.display='flex';}else{document.getElementById('authScreen').style.display='flex';document.getElementById('app').style.display='none'}})
window.login = async()=>{try{await signInWithEmailAndPassword(auth,email.value,password.value)}catch(e){alert(e.message)}}
window.signup = async()=>{try{await createUserWithEmailAndPassword(auth,email.value,password.value)}catch(e){alert(e.message)}}

window.handleMessageSending=async()=>{
  const text=document.getElementById('chatInput').value.trim();if(!text)return;
  document.getElementById('chatInput').value='';
  document.getElementById('welcome').style.display='none';
  addBubble('user',text);
  const aiId=addBubble('ai','Thinking...');

  try {
    const realUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_API_KEY}`;
    const url = PROXY_URL + encodeURIComponent(realUrl);
    
    const history = Array.from(document.querySelectorAll('.bubble')).slice(0,-1).map(b => {
      const isUser = b.classList.contains('user');
      return { role: isUser? 'user' : 'model', parts: [{ text: b.innerText }] };
    });
    history.push({role: 'user', parts: [{text: text}]});

    const res = await fetch(url, {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({contents: history})});
    const data = await res.json();
    
    if(data.candidates && data.candidates[0]){
      const reply = data.candidates[0].content.parts[0].text;
      typeWriter(document.getElementById(aiId), reply);
    } else {
      typeWriter(document.getElementById(aiId), "Error: " + JSON.stringify(data));
    }
  } catch(err) {
    document.getElementById(aiId).innerText = "Network Error: " + err.message;
  }
}

function addBubble(role,text){const id='b'+Date.now();const div=document.createElement('div');div.className=`bubble ${role}`;div.id=id;div.innerText=text;document.getElementById('messages').appendChild(div);document.getElementById('chatArea').scrollTop = 99999; return id}
function typeWriter(el, text){let i=0;el.innerText='';let timer=setInterval(()=>{el.innerText+=text[i++];document.getElementById('chatArea').scrollTop=99999;if(i>=text.length)clearInterval(timer)},15)}
</script>
</body>
</html>
