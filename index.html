<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AURA AI Pro</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
<style>
  html, body { height: 100%; background: #020202; color: #e5e5e5; overflow: hidden; margin:0; }
.aura-orange { color: #FF7A00; }
.bubble { max-width: 85%; padding: 12px; border-radius: 12px; word-wrap: break-word; }
.bubble-user { background: #1a1a1a; border: 1px solid #FF7A00; margin-left: auto; }
.bubble-ai { background: #111; margin-right: auto; }
.prose h1 { font-size: 1.4rem; font-weight: 800; margin:.8rem 0; }
.prose h2 { font-size: 1.1rem; font-weight: 700; margin:.6rem 0; }
.prose a { color: #22c55e; text-decoration: underline; }
.prose img { max-width: 100%; border-radius: 8px; margin: 8px 0; }
.code-block { background: #0a0a0a; border: 1px solid #333; border-radius: 8px; padding: 12px; margin: 1rem 0; position: relative; }
.code-block button { position: absolute; top: 8px; right: 8px; }
  #chat { height: calc(100dvh - 150px); }
  #inputBar { position: fixed; bottom: 0; left: 0; right: 0; background:#020202; }
  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
.bounce { animation: bounce 2s infinite; }
.hidden { display: none!important; }
.icon-btn { padding: 8px; border-radius: 8px; }
</style>
</head>
<body>

<div id="welcome" class="h-screen flex-col items-center justify-center p-6 text-center">
  <h1 class="text-5xl font-bold aura-orange bounce mb-4">AURA</h1>
  <button id="startBtn" class="bg-[#FF7A00] text-black font-bold py-3 px-8 rounded-lg text-lg">Start Chatting</button>
</div>

<div id="app" class="hidden h-screen flex-col">
  <header class="p-3 border-b border-[#222] flex justify-between items-center">
    <button id="menuBtn" class="text-2xl">☰</button>
    <h1 class="text-lg font-bold aura-orange">AURA AI Pro</h1>
    <button id="plusBtn" class="text-2xl">+</button>
  </header>
  <div id="chat" class="overflow-y-auto p-3 space-y-3"></div>
  <div id="inputBar" class="p-2 border-t border-[#222]">
    <div id="preview" class="hidden mb-2"></div>
    <form id="form" class="flex gap-2 items-center">
      <button type="button" id="attachBtn" class="icon-btn">📎</button>
      <button type="button" id="cameraBtn" class="icon-btn">📷</button>
      <input type="file" id="fileInput" accept="image/*" class="hidden">
      <input id="input" autocomplete="off" class="flex-1 bg-[#111] p-3 rounded-lg border-[#333]" placeholder="Message AURA...">
      <button type="submit" class="bg-[#FF7A00] text-black px-4 py-3 rounded-lg font-bold">➤</button>
    </form>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, getDocs, doc, setDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = { apiKey: "AIzaSyDTAqb0waoaoSDrwOa2UXRjwl8wmSyXUs0", projectId: "my-wyticle-id" };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  let currentChatId = Date.now().toString();
  let chats = [];

  const welcome = document.getElementById('welcome');
  const appDiv = document.getElementById('app');
  const chat = document.getElementById('chat');
  const form = document.getElementById('form');
  const input = document.getElementById('input');

  document.getElementById('startBtn').onclick = () => { welcome.classList.add('hidden'); appDiv.classList.remove('hidden'); loadChats(); }
  document.getElementById('menuBtn').onclick = () => { sidebar.classList.toggle('hidden'); overlay.classList.toggle('hidden'); }

  marked.setOptions({ breaks: true });
  const renderer = new marked.Renderer();
  renderer.code = (code) => `<div class="code-block"><button onclick="copyCode(this)" class="text-xs aura-orange">Copy</button><pre><code>${code}</code></pre></div>`;
  marked.setOptions({ renderer });
  function renderMessage(text) { return DOMPurify.sanitize(marked.parse(text)); }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const msg = input.value.trim();
    if(!msg) return;
    addMessage('user', msg);
    input.value = '';
    await streamAI(msg);
  });

  function addMessage(role, content) {
    const div = document.createElement('div');
    div.className = `bubble ${role === 'user'? 'bubble-user' : 'bubble-ai'}`;
    div.innerHTML = `<div class="prose">${renderMessage(content)}</div>`;
    div.innerHTML += `<div class="flex gap-3 mt-2 text-xs text-gray-400"><button onclick="copyMsg(this)">Copy</button><button onclick="redo()">Redo</button><button onclick="delMsg(this)">Delete</button></div>`;
    chat.appendChild(div);
    setTimeout(() => chat.scrollTop = chat.scrollHeight, 100);
    return div;
  }

  // FIXED STREAM FUNCTION
  async function streamAI(prompt) {
    const bubble = addMessage('ai', '');
    const contentDiv = bubble.querySelector('.prose');
    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({messages: [
          {role:'system', content:'You are AURA. Be human, warm, use emojis. Use # H1 ## H2, tables, ```code```.'},
      ...getAllMessages(), {role:'user', content: prompt}
        ]})
      });
      
      // FIX: Don't parse JSON on error. Read as text first
      if(!res.ok) {
        const errText = await res.text(); // read as text
        throw new Error(`Server ${res.status}: ${errText}`);
      }

      const reader = res.body.getReader();
      let text = '';
      while(true) {
        const {done, value} = await reader.read();
        if(done) break;
        text += new TextDecoder().decode(value);
        contentDiv.innerHTML = renderMessage(text);
        chat.scrollTop = chat.scrollHeight;
      }
      saveChat();
    } catch(err) {
      contentDiv.innerText = err.message; // Show real error
      contentDiv.style.color = "#ef4444";
    }
  }

  function getAllMessages() {
    return [...chat.children].map(b => ({
      role: b.classList.contains('bubble-user')? 'user' : 'assistant',
      content: b.querySelector('.prose').innerText
    }));
  }

  async function saveChat() {
    const title = chat.querySelector('.bubble-user .prose')?.innerText.slice(0,50) || 'New Chat';
    await setDoc(doc(db, "chats", currentChatId), {messages: chat.innerHTML, title, updated: Date.now()});
    loadChats();
  }

  async function loadChats() {
    const q = query(collection(db, "chats"), orderBy("updated","desc"));
    const snap = await getDocs(q);
    chats = snap.docs.map(d => ({id: d.id,...d.data()}));
    chatList.innerHTML = chats.map(c =>
      `<div onclick="openChat('${c.id}')" class="p-2 hover:bg-[#111] rounded cursor-pointer truncate text-sm">${c.title}</div>`
    ).join('');
  }

  window.openChat = (id) => { currentChatId = id; const c = chats.find(x => x.id === id); chat.innerHTML = c.messages; }
  window.copyMsg = (btn) => navigator.clipboard.writeText(btn.closest('.bubble').querySelector('.prose').innerText);
  window.delMsg = (btn) => { btn.closest('.bubble').remove(); saveChat(); }
  window.redo = () => { const lastUser = [...chat.children].reverse().find(b => b.classList.contains('bubble-user')); if(lastUser) streamAI(lastUser.querySelector('.prose').innerText); }
</script>
</body>
</html>
