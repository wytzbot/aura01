<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURA AI</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
<style>
  body { background: #000; color: #fff; margin:0; }
.orange { color: #FF7A00; }
.btn-orange { background: #FF7A00; color: #000; }
.bubble { padding: 12px; margin: 8px 0; border-radius: 12px; max-width: 90%; }
.user { background: #222; border: 1px solid #FF7A00; margin-left: auto; }
.ai { background: #111; margin-right: auto; }
  #chat { height: calc(100vh - 160px); overflow-y: auto; padding: 10px; }
</style>
</head>
<body>

<div id="welcome" class="h-screen flex flex-col items-center justify-center p-6 text-center">
  <h1 class="text-5xl font-extrabold orange mb-3">AURA</h1>
  <p class="text-gray-400 mb-8">Your funny, smart AI bestie 😎</p>
  <button id="startBtn" class="btn-orange font-bold py-4 px-10 rounded-xl text-lg">Start Chatting</button>
</div>

<div id="chatPage" class="hidden h-screen flex-col">
  <header class="p-4 border-b border-gray-800 flex justify-between">
    <button id="backBtn" class="text-2xl">←</button>
    <h1 class="text-xl font-bold orange">AURA</h1>
    <button id="newBtn" class="text-2xl">+</button>
  </header>

  <div id="chat"></div>

  <div class="p-3 border-t border-gray-800 bg-black">
    <div id="preview" class="hidden mb-2"></div>
    <form id="form" class="flex gap-2 items-center">
      <button type="button" id="attachBtn" class="text-2xl p-2">📎</button>
      <button type="button" id="cameraBtn" class="text-2xl p-2">📷</button>
      <input type="file" id="fileInput" accept="image/*" class="hidden">
      <input id="input" class="flex-1 bg-[#111] p-3 rounded-xl outline-none" placeholder="Message AURA...">
      <button type="submit" class="btn-orange p-3 rounded-xl font-bold">➤</button>
    </form>
  </div>
</div>

<script>
  let attachedFile = null;
  const welcome = document.getElementById('welcome');
  const chatPage = document.getElementById('chatPage');
  const chat = document.getElementById('chat');

  document.getElementById('startBtn').onclick = () => { welcome.style.display = 'none'; chatPage.style.display = 'flex'; }
  document.getElementById('backBtn').onclick = () => { chatPage.style.display = 'none'; welcome.style.display = 'flex'; }
  document.getElementById('newBtn').onclick = () => { chat.innerHTML = ''; }

  document.getElementById('attachBtn').onclick = () => document.getElementById('fileInput').click();
  document.getElementById('cameraBtn').onclick = () => { document.getElementById('fileInput').setAttribute('capture', 'environment'); document.getElementById('fileInput').click(); }
  document.getElementById('fileInput').onchange = (e) => {
    const file = e.target.files[0];
    if(file) { attachedFile = file; const reader = new FileReader(); reader.onload = (ev) => { document.getElementById('preview').innerHTML = `<img src="${ev.target.result}" style="max-width:100px;border-radius:8px">`; document.getElementById('preview').classList.remove('hidden'); } reader.readAsDataURL(file); }
  }

  document.getElementById('form').onsubmit = async (e) => {
    e.preventDefault();
    const msg = document.getElementById('input').value.trim();
    if(!msg &&!attachedFile) return;
    addMsg('user', attachedFile? `[Image] ${msg}` : msg);
    document.getElementById('input').value = ''; document.getElementById('preview').classList.add('hidden');
    addMsg('ai', 'Thinking... 😎');
    await callAI(msg);
    attachedFile = null;
  }

  function addMsg(role, text) {
    const div = document.createElement('div');
    div.className = `bubble ${role}`;
    div.innerHTML = DOMPurify.sanitize(marked.parse(text));
    chat.appendChild(div); chat.scrollTop = chat.scrollHeight; return div;
  }

  // FIXED CALLAI
  async function callAI(prompt) {
    const aiBubble = chat.lastChild;
    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({messages: [{role:'user', content: prompt}]})
      });
      
      const data = await res.json(); // This was crashing before
      aiBubble.innerHTML = DOMPurify.sanitize(marked.parse(data.text));

    } catch(err) {
      aiBubble.innerHTML = "Network Error: " + err.message + " 😭 Check if /api/chat deployed";
      aiBubble.style.color = 'red';
    }
  }
</script>
</body>
  </html>
