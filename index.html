<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- Interactive-widget ensures the viewport resizes when the mobile keyboard appears -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
  <title>AURA - Your Coding Partner</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            orange: '#FF5500',
            darkOrange: '#CC4400',
            darkBg: '#080808',
            panelBg: '#121212',
            borderDark: '#222222',
          }
        }
      }
    }
  </script>

  <!-- Highlight.js for Syntax Highlighting -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <!-- Marked for Markdown Parsing -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Import Maps for Firebase ESM -->
  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
      }
    }
  </script>

  <style>
    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .bg-animated {
      background: linear-gradient(-45deg, #000000, #0c0300, #1f0800, #330e00, #000000);
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
    }
    .text-orange-gradient {
      background: linear-gradient(135deg, #ffffff 0%, #FF5500 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    canvas {
      position: absolute;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 1;
    }
    .content-zone {
      position: relative;
      z-index: 2;
    }
    .pb-safe {
      /* Safe area padding for iPhones with home bars */
      padding-bottom: env(safe-area-inset-bottom, 8px);
    }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #080808; }
    ::-webkit-scrollbar-thumb { background: #222222; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #FF5500; }
  </style>
</head>
<!-- Replaced h-screen with h-[100dvh] for perfect mobile keyboard tracking -->
<body class="bg-darkBg text-gray-100 font-sans antialiased h-[100dvh] overflow-hidden flex flex-col select-none">

  <canvas id="particleCanvas"></canvas>

  <div id="app" class="content-zone flex-1 flex flex-col h-full overflow-hidden">

    <!-- WELCOME PAGE -->
    <section id="welcomePage" class="flex-1 flex flex-col items-center justify-center p-6 text-center bg-animated h-full">
      <div class="max-w-md w-full flex flex-col items-center space-y-8">
        <div class="space-y-3">
          <div class="inline-flex items-center justify-center p-3 bg-orange/10 rounded-2xl border border-orange/20 mb-2">
            <i data-lucide="sparkles" class="w-10 h-10 text-orange"></i>
          </div>
          <h1 class="text-5xl font-black tracking-tight text-orange-gradient">AURA</h1>

          </div>
        </div>
        <div class="w-full space-y-3 pt-4">
          <button id="btnStartCoding" class="w-full py-4 px-6 bg-orange text-black font-bold rounded-xl shadow-lg shadow-orange/10 hover:bg-orange/90 transition active:scale-95 flex items-center justify-center gap-2 text-base">

          <button id="btnWelcomeLogin" class="w-full py-3 px-6 bg-panelBg border border-borderDark hover:border-gray-700 text-gray-300 font-medium rounded-xl transition active:scale-95 text-sm">

    </section>

    <!-- AUTH PAGE -->
    <section id="authPage" class="hidden flex-1 flex flex-col items-center justify-center p-4 bg-darkBg h-full overflow-y-auto">
      <div class="w-full max-w-md bg-panelBg border border-borderDark rounded-2xl p-6 sm:p-8 shadow-2xl relative my-auto">
        <button id="btnBackToWelcome" class="absolute top-6 left-6 text-gray-400 hover:text-white">

        </button>
        <div class="text-center mb-6 pt-2">
          <h2 id="authTitle" class="text-2xl font-bold text-white">Create Account</h2>
          <p id="authSubtitle" class="text-xs text-gray-400 mt-1">Join AURA to start building faster</p>
        </div>
        <button id="btnGoogleAuth" class="w-full py-3 px-4 bg-darkBg border border-borderDark hover:border-gray-700 rounded-xl text-sm font-medium text-gray-200 flex items-center justify-center gap-3 transition active:scale-95 mb-5">
          <svg class="w-4 h-4" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z"/></svg>

        <div class="flex items-center my-4">

            <input type="text" id="inputEmail" required placeholder="name@company.com" class="w-full bg-darkBg border border-borderDark rounded-xl px-4 py-2.5 text-sm text-white focus:outline-none focus:border-orange">

          <div class="space-y-1">
            <label id="lblPassword" class="text-xs font-medium text-gray-400">Create Password</label>
            <div class="relative">
              <input type="password" id="inputPassword" required placeholder="••••••••" class="w-full bg-darkBg border border-borderDark rounded-xl px-4 py-2.5 pr-10 text-sm text-white focus:outline-none focus:border-orange">
              <button type="button" class="btnTogglePass absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-white"><i data-lucide="eye" class="w-4 h-4"></i></button>
            </div>

          <div id="fieldConfirmPass" class="space-y-1">
            <label class="text-xs font-medium text-gray-400">Confirm Password</label>
            <div class="relative">
              <input type="password" id="inputConfirmPassword" placeholder="••••••••" class="w-full bg-darkBg border border-borderDark rounded-xl px-4 py-2.5 pr-10 text-sm text-white focus:outline-none focus:border-orange">
              <button type="button" class="btnTogglePass absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-white"><i data-lucide="eye" class="w-4 h-4"></i></button>

        </form>
        <div class="text-center mt-6">
          <button id="btnToggleAuthMode" class="text-xs text-gray-400 hover:text-white">
            Already have an account? <span class="text-orange font-medium">Log In</span>
          </button>
        </div>
      </div>
    </section>

    <!-- CHAT PAGE -->
    <section id="chatPage" class="hidden flex-1 flex h-full overflow-hidden bg-darkBg relative">

      <div id="sidebarOverlay" class="fixed inset-0 bg-black/60 z-30 opacity-0 pointer-events-none transition-opacity"></div>

      <aside id="sidebar" class="fixed md:static inset-y-0 left-0 w-72 bg-panelBg border-r border-borderDark z-40 transform -translate-x-full md:translate-x-0 transition-transform duration-300 flex flex-col h-full">
        <div class="p-4 border-b border-borderDark flex items-center justify-between">
          <div class="flex items-center gap-2">
            <i data-lucide="sparkles" class="w-5 h-5 text-orange"></i>
            <span class="font-bold text-white tracking-wide">AURA AI</span>
          </div>
          <button id="btnNewChat" class="p-2 text-orange hover:bg-darkBg rounded-lg transition border border-orange/20 flex items-center gap-1 text-xs font-semibold">
            <i data-lucide="plus" class="w-4 h-4"></i>
            <span>New</span>
          </button>
        </div>
        <div class="p-3">
          <div class="relative">
            <i data-lucide="search" class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-gray-500"></i>
            <input type="text" id="inputSearchChats" placeholder="Search chats..." class="w-full bg-darkBg border border-borderDark rounded-xl pl-9 pr-3 py-2 text-xs text-white focus:outline-none focus:border-orange">
          </div>
        </div>
        <div id="chatHistoryList" class="flex-1 overflow-y-auto px-3 space-y-1 py-2"></div>
        <div class="p-4 border-t border-borderDark flex items-center justify-between bg-darkBg/50">
          <div class="flex items-center gap-2 overflow-hidden">
            <div id="userAvatar" class="w-8 h-8 rounded-full bg-orange/20 border border-orange/40 text-orange flex items-center justify-center font-bold text-xs uppercase">U</div>
            <span id="userEmailDisplay" class="text-xs text-gray-300 truncate">user@aura.ai</span>
          </div>
          <button id="btnLogout" class="p-2 text-gray-400 hover:text-red-400 rounded-lg hover:bg-darkBg transition"><i data-lucide="log-out" class="w-4 h-4"></i></button>
        </div>
      </aside>

      <main class="flex-1 flex flex-col h-full relative overflow-hidden bg-darkBg">
        
        <header class="h-14 border-b border-borderDark flex items-center justify-between px-4 bg-panelBg/80 backdrop-blur shrink-0 z-10">
          <button id="btnToggleSidebar" class="p-2 text-gray-300 hover:text-white rounded-lg hover:bg-darkBg transition"><i data-lucide="menu" class="w-5 h-5"></i></button>
          <span class="text-xs font-semibold text-gray-300 bg-darkBg px-3.5 py-1.5 rounded-full border border-orange/30 flex items-center gap-2 shadow-sm shadow-orange/10">
            <span class="w-2 h-2 rounded-full bg-orange animate-pulse"></span>
            Customized AURA
          </span>
          <button id="btnHeaderNewChat" class="p-2 text-gray-300 hover:text-white rounded-lg hover:bg-darkBg transition"><i data-lucide="square-pen" class="w-5 h-5"></i></button>
        </header>

        <div id="emptyGreeting" class="flex-1 flex flex-col items-center justify-center p-6 text-center select-none overflow-y-auto">
          <div class="p-4 bg-orange/5 rounded-full border border-orange/10 mb-4">
            <i data-lucide="code-2" class="w-8 h-8 text-orange"></i>
          </div>
          <h2 id="rotatingGreet" class="text-2xl sm:text-3xl font-bold text-white mb-2 transition-opacity duration-500 opacity-100">Welcome back</h2>
          <p class="text-gray-400 text-sm max-w-sm">Ask a question, upload photos, or attach code files to begin.</p>
        </div>

        <div id="messagesContainer" class="hidden flex-1 overflow-y-auto p-4 sm:p-6 space-y-6"></div>

        <!-- NEW INPUT BAR: Reduced height, Black background, Orange ring, properly constrained for mobile viewports -->
        <div class="shrink-0 w-full bg-black border-t border-borderDark/60 z-20 pb-safe pt-2 px-3">
          <div class="max-w-3xl mx-auto">
            
            <!-- Attachment & Image Preview Bar -->
            <div id="attachmentPreview" class="hidden mb-2 p-2 bg-panelBg border border-orange/30 rounded-xl flex items-center justify-between gap-3 text-xs text-gray-200">
              <div class="flex items-center gap-3 overflow-hidden">
                <img id="imgPreviewThumb" class="w-10 h-10 object-cover rounded-md border border-orange/50 hidden" alt="Preview">
                <i id="attachmentIcon" data-lucide="file-text" class="w-5 h-5 text-orange shrink-0"></i>
                <span id="attachmentName" class="truncate font-medium">filename.txt</span>
              </div>
              <button id="btnRemoveAttachment" class="text-gray-400 hover:text-red-400 p-1.5 transition bg-darkBg rounded-md"><i data-lucide="x" class="w-4 h-4"></i></button>
            </div>

            <!-- Black Box + Orange Ring -->
            <div class="bg-black border border-orange/50 focus-within:ring-2 focus-within:ring-orange focus-within:border-orange rounded-xl p-1.5 transition-all shadow-lg shadow-orange/5">
              <textarea id="chatInput" rows="1" placeholder="Message AURA..." class="w-full bg-black px-2 py-1.5 text-[15px] text-white placeholder-gray-500 focus:outline-none resize-none max-h-24 min-h-[30px]"></textarea>
              
              <div class="flex items-center justify-between mt-1 pt-1 px-1">
                <div class="flex items-center gap-1">
                  <input type="file" id="fileAttach" accept="image/*,text/*,.js,.jsx,.py,.html,.css,.json,.ts,.tsx" class="hidden">
                  <button id="btnAttach" class="p-1.5 text-gray-400 hover:text-orange hover:bg-panelBg rounded-md transition" title="Attach photo or file"><i data-lucide="paperclip" class="w-5 h-5"></i></button>
                </div>
                <button id="btnSend" class="p-2 bg-orange text-black font-bold rounded-lg hover:bg-orange/90 transition active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed">
                  <i data-lucide="send" class="w-4 h-4"></i>
                </button>
              </div>
            </div>
            
            <p class="text-[10px] text-center text-gray-500 mt-1 mb-1">AURA can make mistakes. Verify critical code.</p>
          </div>
        </div>

      </main>
    </section>

  </div>

  <script type="module">
    import { initializeApp } from "firebase/app";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, sendPasswordResetEmail, GoogleAuthProvider, signInWithPopup } from "firebase/auth";
    import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "firebase/firestore";

    const firebaseConfig = {
      apiKey: "AIzaSyDTAqb0waoaoSDrwOa2UXRjwl8wmSyXUs0",
      authDomain: "my-wyticle-id.firebaseapp.com",
      projectId: "my-wyticle-id",
      storageBucket: "my-wyticle-id.firebasestorage.app",
      messagingSenderId: "634169882815",
      appId: "1:634169882815:web:486d39a13ce2f855c0ae0a"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const googleProvider = new GoogleAuthProvider();

    let currentUser = null;
    let authIsSignUp = true;
    let chats = [];
    let currentChatId = null;
    let attachmentData = null;
    let editingMessageIndex = null;

    const welcomePage = document.getElementById('welcomePage');
    const authPage = document.getElementById('authPage');
    const chatPage = document.getElementById('chatPage');
    const sidebar = document.getElementById('sidebar');
    const sidebarOverlay = document.getElementById('sidebarOverlay');
    const chatInput = document.getElementById('chatInput');
    const btnSend = document.getElementById('btnSend');
    const messagesContainer = document.getElementById('messagesContainer');
    const emptyGreeting = document.getElementById('emptyGreeting');
    const chatHistoryList = document.getElementById('chatHistoryList');

    lucide.createIcons();

    const canvas = document.getElementById('particleCanvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    class Particle {
      constructor() { this.reset(); }
      reset() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 2 + 1;
        this.speedX = (Math.random() - 0.5) * 0.5;
        this.speedY = (Math.random() - 0.5) * 0.5;
        this.alpha = Math.random() * 0.5 + 0.2;
      }
      update() {
        this.x += this.speedX; this.y += this.speedY;
        if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.reset();
      }
      draw() {
        ctx.fillStyle = `rgba(255, 85, 0, ${this.alpha})`;
        ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
      }
    }
    for (let i = 0; i < 50; i++) particles.push(new Particle());
    function animateParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => { p.update(); p.draw(); });
      requestAnimationFrame(animateParticles);
    }
    animateParticles();

    function showPage(page) {
      welcomePage.classList.add('hidden');
      authPage.classList.add('hidden');
      chatPage.classList.add('hidden');
      page.classList.remove('hidden');
    }

    document.getElementById('btnStartCoding').onclick = () => { setAuthMode(true); showPage(authPage); };
    document.getElementById('btnWelcomeLogin').onclick = () => { setAuthMode(false); showPage(authPage); };
    document.getElementById('btnBackToWelcome').onclick = () => showPage(welcomePage);

    function setAuthMode(isSignUp) {
      authIsSignUp = isSignUp;
      document.getElementById('authTitle').textContent = isSignUp ? "Create Account" : "Welcome Back";
      document.getElementById('fieldUsername').style.display = isSignUp ? 'block' : 'none';
      document.getElementById('fieldConfirmPass').style.display = isSignUp ? 'block' : 'none';
      document.getElementById('lblEmail').textContent = isSignUp ? "Email Address" : "Email or Username";
      document.getElementById('btnAuthSubmit').textContent = isSignUp ? "Sign Up" : "Log In";
      document.getElementById('btnToggleAuthMode').innerHTML = isSignUp 
        ? 'Already have an account? <span class="text-orange font-medium">Log In</span>'
        : 'Need an account? <span class="text-orange font-medium">Sign Up</span>';
      document.getElementById('authError').classList.add('hidden');
    }
    document.getElementById('btnToggleAuthMode').onclick = () => setAuthMode(!authIsSignUp);
    document.querySelectorAll('.btnTogglePass').forEach(btn => {
      btn.onclick = () => {
        const input = btn.previousElementSibling;
        input.type = input.type === 'password' ? 'text' : 'password';
      };
    });

    document.getElementById('authForm').onsubmit = async (e) => {
      e.preventDefault();
      const emailOrUser = document.getElementById('inputEmail').value.trim();
      const password = document.getElementById('inputPassword').value;
      const errorEl = document.getElementById('authError');
      errorEl.classList.add('hidden');
      try {
        if (authIsSignUp) {
          if (password !== document.getElementById('inputConfirmPassword').value) throw new Error("Passwords do not match");
          await createUserWithEmailAndPassword(auth, emailOrUser, password);
        } else {
          const loginEmail = emailOrUser.includes('@') ? emailOrUser : `${emailOrUser}@aura.ai`;
          await signInWithEmailAndPassword(auth, loginEmail, password);
        }
      } catch (err) {
        errorEl.textContent = err.message; errorEl.classList.remove('hidden');
      }
    };

    document.getElementById('btnLogout').onclick = () => signOut(auth);

    onAuthStateChanged(auth, (user) => {
      currentUser = user;
      if (user) {
        document.getElementById('userEmailDisplay').textContent = user.email || 'Anonymous';
        document.getElementById('userAvatar').textContent = (user.email || 'U').charAt(0).toUpperCase();
        showPage(chatPage); loadChats();
      } else {
        if (!welcomePage.classList.contains('hidden') || !chatPage.classList.contains('hidden')) showPage(welcomePage);
      }
    });

    function openSidebar() { sidebar.classList.remove('-translate-x-full'); sidebarOverlay.classList.remove('opacity-0', 'pointer-events-none'); }
    function closeSidebar() { sidebar.classList.add('-translate-x-full'); sidebarOverlay.classList.add('opacity-0', 'pointer-events-none'); }
    document.getElementById('btnToggleSidebar').onclick = () => sidebar.classList.contains('-translate-x-full') ? openSidebar() : closeSidebar();
    sidebarOverlay.onclick = closeSidebar;

    document.getElementById('btnNewChat').onclick = createNewChat;
    document.getElementById('btnHeaderNewChat').onclick = createNewChat;
    function createNewChat() {
      currentChatId = Date.now().toString();
      chats.unshift({ id: currentChatId, title: "New Conversation", updatedAt: Date.now(), messages: [] });
      saveChats(); renderChatHistory(); selectChat(currentChatId);
      if (window.innerWidth < 768) closeSidebar();
    }

    function saveChats() {
      if (!currentUser) return;
      localStorage.setItem(`aura_chats_${currentUser.uid}`, JSON.stringify(chats));
      setDoc(doc(db, "users", currentUser.uid), { chats: chats }, { merge: true }).catch(e => console.error(e));
    }

    async function loadChats() {
      if (!currentUser) return;
      const localData = localStorage.getItem(`aura_chats_${currentUser.uid}`);
      if (localData) { try { chats = JSON.parse(localData); renderChatHistory(); } catch (e) { chats = []; } }
      onSnapshot(doc(db, "users", currentUser.uid), (docSnap) => {
        if (docSnap.exists() && docSnap.data().chats) {
          chats = docSnap.data().chats;
          localStorage.setItem(`aura_chats_${currentUser.uid}`, JSON.stringify(chats));
          renderChatHistory(); if (currentChatId) renderMessages();
        }
      });
    }

    function renderChatHistory() {
      chatHistoryList.innerHTML = "";
      chats.forEach(chat => {
        const item = document.createElement('div');
        const isActive = chat.id === currentChatId;
        item.className = `group flex items-center justify-between p-2.5 rounded-xl text-xs cursor-pointer transition ${isActive ? 'bg-orange/10 text-orange border border-orange/20' : 'text-gray-300 hover:bg-darkBg hover:text-white'}`;
        item.innerHTML = `<div class="flex items-center gap-2 overflow-hidden flex-1"><i data-lucide="message-square" class="w-3.5 h-3.5 flex-shrink-0"></i><span class="truncate">${escapeHtml(chat.title)}</span></div><button class="btnDeleteChat opacity-0 group-hover:opacity-100 p-1 hover:text-red-400 transition"><i data-lucide="trash-2" class="w-3 h-3"></i></button>`;
        item.onclick = (e) => {
          if (e.target.closest('.btnDeleteChat')) { e.stopPropagation(); deleteChat(chat.id); } 
          else { selectChat(chat.id); if (window.innerWidth < 768) closeSidebar(); }
        };
        chatHistoryList.appendChild(item);
      });
      lucide.createIcons();
    }

    function selectChat(id) { currentChatId = id; renderChatHistory(); renderMessages(); }
    function deleteChat(id) {
      chats = chats.filter(c => c.id !== id);
      if (currentChatId === id) currentChatId = chats.length > 0 ? chats[0].id : null;
      saveChats(); renderChatHistory(); renderMessages();
    }

    function renderMessages() {
      const activeChat = chats.find(c => c.id === currentChatId);
      if (!activeChat || activeChat.messages.length === 0) {
        emptyGreeting.classList.remove('hidden'); messagesContainer.classList.add('hidden');
        messagesContainer.innerHTML = ''; return;
      }
      emptyGreeting.classList.add('hidden'); messagesContainer.classList.remove('hidden');
      messagesContainer.innerHTML = '';
      activeChat.messages.forEach((msg, idx) => messagesContainer.appendChild(createMessageElement(msg, idx)));
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    function createMessageElement(msg, index) {
      const isUser = msg.role === 'user';
      const wrapper = document.createElement('div');
      wrapper.className = `group flex flex-col ${isUser ? 'items-end' : 'items-start'} space-y-1 relative mb-4`;

      const contentDiv = document.createElement('div');
      contentDiv.className = `max-w-[90%] sm:max-w-[80%] rounded-2xl p-4 text-sm leading-relaxed ${isUser ? 'bg-orange text-black font-medium shadow-md shadow-orange/10 rounded-tr-none' : 'bg-panelBg border border-borderDark text-gray-100 rounded-tl-none shadow-lg'}`;

      if (isUser) {
        if (msg.previewImage) {
          const img = document.createElement('img');
          img.src = msg.previewImage;
          img.className = "max-w-full max-h-60 rounded-xl mb-2 object-cover border border-black/20 shadow-md";
          contentDiv.appendChild(img);
        }
        if (msg.text) {
          const p = document.createElement('p'); p.textContent = msg.text; contentDiv.appendChild(p);
        }
      } else {
        const textDiv = document.createElement('div');
        textDiv.innerHTML = parseMarkdown(msg.text);
        contentDiv.appendChild(textDiv);
      }
      wrapper.appendChild(contentDiv);
      return wrapper;
    }

    // Attachments Handling
    document.getElementById('btnAttach').onclick = () => document.getElementById('fileAttach').click();
    document.getElementById('fileAttach').onchange = (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const isImage = file.type.startsWith('image/');
      const reader = new FileReader();
      const imgThumb = document.getElementById('imgPreviewThumb');
      const attachmentIcon = document.getElementById('attachmentIcon');

      if (isImage) {
        reader.onload = (event) => {
          const dataUrl = event.target.result;
          const base64Data = dataUrl.split(',')[1];
          attachmentData = { name: file.name, mimeType: file.type, data: base64Data, isImage: true, preview: dataUrl };
          imgThumb.src = dataUrl; imgThumb.classList.remove('hidden'); attachmentIcon.classList.add('hidden');
          document.getElementById('attachmentName').textContent = file.name;
          document.getElementById('attachmentPreview').classList.remove('hidden');
        };
        reader.readAsDataURL(file); 
      } else {
        reader.onload = (event) => {
          attachmentData = { name: file.name, content: event.target.result, isImage: false };
          imgThumb.classList.add('hidden'); attachmentIcon.classList.remove('hidden');
          attachmentIcon.setAttribute('data-lucide', 'file-text');
          document.getElementById('attachmentName').textContent = file.name;
          document.getElementById('attachmentPreview').classList.remove('hidden');
          lucide.createIcons();
        };
        reader.readAsText(file); 
      }
    };

    document.getElementById('btnRemoveAttachment').onclick = () => {
      attachmentData = null; document.getElementById('fileAttach').value = "";
      document.getElementById('attachmentPreview').classList.add('hidden');
    };

    chatInput.addEventListener('input', () => {
      chatInput.style.height = 'auto'; chatInput.style.height = `${Math.min(chatInput.scrollHeight, 128)}px`;
    });
    chatInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSendMessage(); }
    });
    btnSend.onclick = handleSendMessage;

    function handleSendMessage() {
      let promptText = chatInput.value.trim();
      if (!promptText && !attachmentData) return;
      const currentAttachment = attachmentData;

      attachmentData = null;
      document.getElementById('fileAttach').value = "";
      document.getElementById('attachmentPreview').classList.add('hidden');
      chatInput.value = ""; chatInput.style.height = 'auto';

      if (!currentChatId) {
        currentChatId = Date.now().toString();
        chats.unshift({ id: currentChatId, title: (promptText || "Attached Media").slice(0, 30) + "...", updatedAt: Date.now(), messages: [] });
      }

      const activeChat = chats.find(c => c.id === currentChatId);
      if (activeChat.messages.length === 0) activeChat.title = (promptText || "Attached Media").slice(0, 30) + "...";

      activeChat.messages.push({ role: 'user', text: promptText, previewImage: currentAttachment?.isImage ? currentAttachment.preview : null, attachment: currentAttachment });
      saveChats(); renderChatHistory(); renderMessages(); sendPromptToAI();
    }

    async function sendPromptToAI() {
      const activeChat = chats.find(c => c.id === currentChatId);
      if (!activeChat) return;

      const userEmail = currentUser?.email || "";
      const lastUserMsg = activeChat.messages[activeChat.messages.length - 1];

      const aiMessageObj = { role: 'assistant', text: "Typing..." };
      activeChat.messages.push(aiMessageObj);
      renderMessages(); btnSend.disabled = true;

      try {
        const formattedMessages = activeChat.messages.slice(0, -1).map(m => ({
          role: m.role, content: m.text
        }));

        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-User-Email': userEmail },
          body: JSON.stringify({ messages: formattedMessages, prompt: lastUserMsg?.text || "", attachment: lastUserMsg?.attachment || null })
        });

        const data = await response.json();
        if (!response.ok) throw new Error(data.text || "Server error");
        aiMessageObj.text = data.text || "No response received.";
      } catch (err) {
        aiMessageObj.text = `⚠️ Error: ${err.message}`;
      } finally {
        btnSend.disabled = false; saveChats(); renderMessages();
      }
    }

    function parseMarkdown(text) {
      const rawHtml = marked.parse(text);
      const temp = document.createElement('div'); temp.innerHTML = rawHtml;
      temp.querySelectorAll('pre code').forEach((codeEl) => {
        const langClass = Array.from(codeEl.classList).find(c => c.startsWith('language-'));
        const lang = langClass ? langClass.replace('language-', '') : 'jsx';
        hljs.highlightElement(codeEl);
        const pre = codeEl.parentElement;
        const container = document.createElement('div');
        container.className = "code-block-container my-3 rounded-xl overflow-hidden border border-borderDark bg-[#282c34]";
        const header = document.createElement('div');
        header.className = "flex items-center justify-between px-4 py-2 bg-darkBg/90 border-b border-borderDark text-xs font-mono text-gray-400";
        header.innerHTML = `<span class="text-orange font-semibold uppercase tracking-wider">${lang}</span><div class="flex items-center gap-3"><button type="button" class="btnCopyCode hover:text-white transition flex items-center gap-1"><i data-lucide="copy" class="w-3.5 h-3.5"></i> Copy</button></div>`;
        container.appendChild(header); pre.parentNode.insertBefore(container, pre); container.appendChild(pre);
      });
      return temp.innerHTML;
    }

    document.addEventListener('click', (e) => {
      const copyBtn = e.target.closest('.btnCopyCode');
      if (copyBtn) {
        e.preventDefault(); e.stopPropagation();
        const container = copyBtn.closest('.code-block-container');
        if (container) {
          const codeEl = container.querySelector('code');
          if (codeEl) copyToClipboard(codeEl.innerText || codeEl.textContent, copyBtn);
        }
      }
    });

    function copyToClipboard(text, btnElement) {
      if (navigator.clipboard && window.isSecureContext) navigator.clipboard.writeText(text).then(() => showCopySuccess(btnElement)).catch(() => fallbackCopy(text, btnElement));
      else fallbackCopy(text, btnElement);
    }
    function fallbackCopy(text, btnElement) {
      const textarea = document.createElement('textarea');
      textarea.value = text; textarea.style.position = 'fixed'; textarea.style.opacity = '0';
      document.body.appendChild(textarea); textarea.select();
      try { document.execCommand('copy'); showCopySuccess(btnElement); } catch (err) { alert('Copy failed.'); }
      document.body.removeChild(textarea);
    }
    function showCopySuccess(btn) {
      if (btn) { btn.innerHTML = `<i data-lucide="check" class="w-3.5 h-3.5 text-orange"></i> Copied!`; lucide.createIcons(); setTimeout(() => { btn.innerHTML = `<i data-lucide="copy" class="w-3.5 h-3.5"></i> Copy`; lucide.createIcons(); }, 2000); }
    }
    function escapeHtml(str) { return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;"); }
  </script>
</body>
</html>
