<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURA AI Pro</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
    * { font-family: 'Inter', sans-serif; }
  html, body { height: 100%; background: #020202; color: #e5e5e5; overflow: hidden; margin:0; }
.gradient-bg { background: radial-gradient(circle at 50% 20%, #FF7A0020 0%, #020202 50%); }
.aura-orange { color: #FF7A00; }
.bubble { max-width: 85%; padding: 14px; border-radius: 16px; word-wrap: break-word; line-height: 1.6; }
.bubble-user { background: #1a1a1a; border: 1px solid #FF7A00; margin-left: auto; }
.bubble-ai { background: #111; margin-right: auto; }
.prose a { color: #22c55e; text-decoration: underline; }
.code-block { background: #0a0a0a; border: 1px solid #333; border-radius: 10px; padding: 14px; margin: 1rem 0; position: relative; }
.code-block button { position: absolute; top: 8px; right: 8px; background:#222; padding:4px 8px; border-radius:6px; font-size:12px; }
  #chat { height: calc(100dvh - 180px); }
  #inputBar { position: fixed; bottom: 0; left: 0; right: 0; background:linear-gradient(to top, #020202 70%, transparent); padding-bottom: env(safe-area-inset-bottom); }
.hidden { display: none!important; visibility: hidden; opacity: 0; pointer-events: none; } /* FIX 1 */
.send-btn { box-shadow: 0 0 20px #FF7A0040; }
  #sidebar { position: fixed; top:0; left:0; height:100%; width:280px; background:#050505; border-right:1px solid #222; z-index:50; transform:translateX(-100%); transition:.3s; }
  #sidebar.open { transform:translateX(0); }
  #overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:#00080; z-index:40; }
.preview-img { max-width: 100px; max-height: 100px; border-radius: 10px; border: 1px solid #FF7A00; }
</style>
</head>
<body>

<div id="sidebar" class="p-4"><h2 class="text-xl font-bold aura-orange mb-4">History</h2><div id="chatList" class="space-y-2"></div></div>
<div id="overlay" class="hidden"></div>

<div id="welcome" class="h-screen gradient-bg flex flex-col items-center justify-center p-6 text-center">
  <h1 class="text-6xl font-extrabold aura-orange mb-3">AURA</h1>
  <p class="text-gray-400 mb-10">Your funny, smart AI bestie 😂</p>
  <button id="startBtn" class="bg-[#FF7A00] text-black font-bold py-4 px-10 rounded-xl text-lg">Start Chatting</button>
</div>

<div id="app" class="hidden h-screen flex-col">
  <header class="p-4 border-b border-[#222] flex justify-between items-center">
    <button id="menuBtn" class="text-2xl">☰</button><h1 class="text-xl font-bold aura-orange">AURA AI</h1><button id="plusBtn" class="text-2xl">+</button>
  </header>
  <div id="chat" class="overflow-y-auto p-4 space-y-4"></div>

  <div id="inputBar" class="p-3 border-t border-[#222]">
    <div id="preview" class="hidden mb-2"></div>
    <form id="form" class="flex gap-2 items-end">
      <button type="button" id="attachBtn" class="p-3 text-xl">📎</button>
      <button type="button" id="cameraBtn" class="p-3 text-xl">📷</button>
      <input type="file" id="fileInput" accept="image/*" class="hidden">
      <input id="input" autocomplete="off" class="flex-1 bg-[#111] p-4 rounded-2xl border-[#333] focus:border-[#FF7A00] outline-none" placeholder="Talk to me...">
      <button type="submit" class="send-btn bg-[#FF7A00] text-black p-4 rounded-2xl">➤</button>
    </form>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, getDocs, doc, setDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = { apiKey: "AIzaSyDTAqb0waoaoSDrwOa2UXRjwl8wmSyXUs0", projectId: "my-wyticle-id" };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  let currentChatId = Date.now().toString();
  let attachedFile = null;

  const welcome = document.getElementById('welcome');
  const appDiv = document.getElementById('app');

  // FIX 2: BULLETPROOF BUTTON
  document.getElementById('startBtn').onclick = () => { 
    welcome.style.display = 'none'; 
    appDiv.style.display = 'flex';
    appDiv.classList.remove('hidden'); 
    history.pushState({page: 'app'}, '');
  }
  
  document.getElementById('menuBtn').onclick = () => { document.getElementById('sidebar').classList.add('open'); document.getElementById('overlay').classList.remove('hidden'); }
  document.getElementById('overlay').onclick = () => { document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.add('hidden'); }
  document.getElementById('attachBtn').onclick = () => document.getElementById('fileInput').click();
  document.getElementById('cameraBtn').onclick = () => { document.getElementById('fileInput').setAttribute('capture', 'environment'); document.getElementById('fileInput').click(); }
  document.getElementById('fileInput').onchange = (e) => {
    const file = e.target.files[0];
    if(file) { attachedFile = file; const reader = new FileReader(); reader.onload = (ev) => { document.getElementById('preview').innerHTML = `<img src="${ev.target.result}" class="preview-img">`; document.getElementById('preview').classList.remove('hidden'); } reader.readAsDataURL(file); }
  }

  marked.setOptions({ breaks: true });
  const renderer = new marked.Renderer();
  renderer.code = (code, lang) => `<div class="code-block"><button onclick="copyCode(this)">Copy</button><pre><code>${code}</code></pre></div>`;
  marked.setOptions({ renderer });
  function renderMessage(text) { return DOMPurify.sanitize(marked.parse(text)); }

  document.getElementById('form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const msg = document.getElementById('input').value.trim();
    if(!msg &&!attachedFile) return;
    addMessage('user', attachedFile? `[Image] ${msg}` : msg);
    document.getElementById('input').value = ''; document.getElementById('preview').classList.add('hidden');
    await streamAI(msg); attachedFile = null;
  });

  function addMessage(role, content) {
    const div = document.createElement('div');
    div.className = `bubble ${role === 'user'? 'bubble-user' : 'bubble-ai'}`;
    div.innerHTML = `<div class="prose">${renderMessage(content)}</div>`;
    div.innerHTML += `<div class="flex gap-3 mt-2 text-xs text-gray-400"><button onclick="copyMsg(this)">Copy</button><button onclick="redo()">Redo</button><button onclick="delMsg(this)">Delete</button></div>`;
    document.getElementById('chat').appendChild(div); setTimeout(() => document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight, 100); return div;
  }

  async function streamAI(prompt) {
    const bubble = addMessage('ai', '');
    const contentDiv = bubble.querySelector('.prose');
    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({messages: [
          {role:'system', content:`You are AURA, a human, funny, and slightly sarcastic AI assistant. Talk like a friend. Use slang, jokes, and emojis 😎🔥 Be warm, helpful. Use markdown: # H1 ## H2, **bold**, *italic*, tables, and \`\`code\`\`. Keep replies short unless asked.`},
        ...getAllMessages(), {role:'user', content: prompt}
        ]})
      });
      if(!res.ok) throw new Error(await res.text());
      const reader = res.body.getReader();
      let text = '';
      while(true) {
        const {done, value} = await reader.read();
        if(done) break;
        text += new TextDecoder().decode(value);
        contentDiv.innerHTML = renderMessage(text);
        document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
      }
    } catch(err) { contentDiv.innerText = "AURA crashed: " + err.message + " 😭"; contentDiv.style.color = "#ef4444"; }
  }

  function getAllMessages() {
    return [...document.getElementById('chat').children].map(b => ({
      role: b.classList.contains('bubble-user')? 'user' : 'assistant',
      content: b.querySelector('.prose').innerText
    }));
  }

  window.copyMsg = (btn) => navigator.clipboard.writeText(btn.closest('.bubble').querySelector('.prose').innerText);
  window.delMsg = (btn) => { btn.closest('.bubble').remove(); }
  window.redo = () => { const lastUser = [...document.getElementById('chat').children].reverse().find(b => b.classList.contains('bubble-user')); if(lastUser) streamAI(lastUser.querySelector('.prose').innerText); }
  window.copyCode = (btn) => navigator.clipboard.writeText(btn.nextElementSibling.innerText);
</script>
</body>
         </html>
