<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
  <title>AURA - Your Coding Partner</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            orange: '#FF5500',
            darkBg: '#080808',
            panelBg: '#121212',
            borderDark: '#222222',
          }
        }
      }
    }
  </script>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    .bg-animated {
      background: linear-gradient(-45deg, #000000, #0c0300, #1f0800, #330e00, #000000);
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
    }
    @keyframes gradientShift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    .text-orange-gradient {
      background: linear-gradient(135deg, #ffffff 0%, #FF5500 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    canvas { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 1; }
    .content-zone { position: relative; z-index: 2; }
    pre code { background: #1e1e1e !important; color: #d4d4d4 !important; display: block; padding: 12px; border-radius: 8px; overflow-x: auto; }
  </style>
</head>
<body class="bg-darkBg text-gray-100 font-sans antialiased h-[100dvh] overflow-hidden flex flex-col select-none">

  <canvas id="particleCanvas"></canvas>

  <div id="app" class="content-zone flex-1 flex flex-col h-full overflow-hidden">

    <!-- WELCOME PAGE -->
    <section id="welcomePage" class="flex-1 flex flex-col items-center justify-center p-6 text-center bg-animated h-full">
      <div class="max-w-md w-full flex flex-col items-center space-y-8">
        <h1 class="text-5xl font-black tracking-tight text-orange-gradient">AURA</h1>
        <button id="btnStartCoding" class="w-full py-4 px-6 bg-orange text-black font-bold rounded-xl shadow-lg">Start Coding</button>
        <button id="btnWelcomeLogin" class="w-full py-3 px-6 bg-panelBg border border-borderDark text-gray-300 font-medium rounded-xl">Log in</button>
      </div>
    </section>

    <!-- AUTH PAGE -->
    <section id="authPage" class="hidden flex-1 flex flex-col items-center justify-center p-4 bg-darkBg h-full overflow-y-auto">
      <div class="w-full max-w-md bg-panelBg border border-borderDark rounded-2xl p-6 shadow-2xl relative my-auto">
        <button id="btnBackToWelcome" class="absolute top-6 left-6 text-gray-400">Back</button>
        <h2 id="authTitle" class="text-2xl font-bold text-white mb-4 text-center">Create Account</h2>
        <form id="authForm" class="space-y-4">
          <input type="text" id="inputEmail" required placeholder="Email" class="w-full bg-darkBg border border-borderDark rounded-xl px-4 py-2 text-sm text-white focus:border-orange">
          <input type="password" id="inputPassword" required placeholder="Password" class="w-full bg-darkBg border border-borderDark rounded-xl px-4 py-2 text-sm text-white focus:border-orange">
          <div id="authError" class="text-xs text-red-400 hidden"></div>
          <button type="submit" id="btnAuthSubmit" class="w-full py-3 bg-orange text-black font-bold rounded-xl">Submit</button>
        </form>
      </div>
    </section>

    <!-- CHAT PAGE WITH COLLAPSIBLE SIDEBAR -->
    <section id="chatPage" class="hidden flex-1 flex h-full overflow-hidden bg-darkBg relative">

      <!-- Backdrop Overlay for Mobile Sidebar -->
      <div id="sidebarOverlay" class="fixed inset-0 bg-black/60 z-30 opacity-0 pointer-events-none transition-opacity md:hidden"></div>

      <!-- Collapsible Sidebar -->
      <aside id="sidebar" class="fixed md:static inset-y-0 left-0 w-72 bg-panelBg border-r border-borderDark z-40 transform -translate-x-full md:translate-x-0 transition-transform duration-300 flex flex-col h-full">
        <div class="p-4 border-b border-borderDark flex items-center justify-between">
          <div class="flex items-center gap-2">
            <i data-lucide="sparkles" class="w-5 h-5 text-orange"></i>
            <span class="font-bold text-white">AURA AI</span>
          </div>
          <div class="flex items-center gap-1">
            <button id="btnNewChat" class="px-2 py-1 bg-orange/10 border border-orange/30 text-orange rounded-lg text-xs font-semibold flex items-center gap-1">
              <i data-lucide="plus" class="w-3.5 h-3.5"><span>New</span></i>
            </button>
            <button id="btnCloseSidebar" class="p-1.5 text-gray-400 hover:text-white md:hidden">
              <i data-lucide="x" class="w-5 h-5"></i>
            </button>
          </div>
        </div>
        <div id="chatHistoryList" class="flex-1 overflow-y-auto px-3 space-y-1 py-2"></div>
      </aside>

      <main class="flex-1 flex flex-col h-full relative overflow-hidden bg-darkBg">
        <header class="h-14 border-b border-borderDark flex items-center justify-between px-4 bg-panelBg/80 shrink-0 z-10">
          <button id="btnToggleSidebar" class="p-2 text-gray-300 hover:text-white rounded-lg transition"><i data-lucide="menu" class="w-5 h-5"></i></button>
          <span class="text-xs font-semibold text-orange bg-darkBg px-3 py-1 rounded-full border border-orange/30">Customized AURA</span>
          <button id="btnHeaderNewChat" class="p-2 text-gray-300 hover:text-white rounded-lg transition"><i data-lucide="square-pen" class="w-5 h-5"></i></button>
        </header>

        <div id="emptyGreeting" class="flex-1 flex flex-col items-center justify-center p-6 text-center">
          <h2 class="text-2xl font-bold text-white mb-2">Welcome back</h2>
          <p class="text-gray-400 text-sm">Ask a question, upload photos, or attach code files to begin.</p>
        </div>

        <div id="messagesContainer" class="hidden flex-1 overflow-y-auto p-4 space-y-6"></div>

        <!-- INPUT BAR -->
        <div class="shrink-0 w-full bg-black border-t border-orange/40 z-20 p-3">
          <div class="max-w-3xl mx-auto">
            
            <!-- Thumbnail Preview Bar -->
            <div id="attachmentPreview" class="hidden mb-2 p-2 bg-panelBg border border-orange rounded-xl flex items-center justify-between">
              <div class="flex items-center gap-2 overflow-hidden">
                <img id="imgPreviewThumb" class="w-12 h-12 object-cover rounded-lg border border-orange hidden" alt="Preview">
                <i id="previewFileIcon" data-lucide="file-text" class="w-5 h-5 text-orange hidden"></i>
                <span id="attachmentName" class="text-xs text-white truncate">filename</span>
              </div>
              <button id="btnRemoveAttachment" class="text-red-400 text-xs">Remove</button>
            </div>

            <!-- Solid Black Container Box -->
            <div style="background-color: #000000 !important; border: 1.5px solid #FF5500 !important;" class="rounded-xl p-2 shadow-lg">
              <textarea id="chatInput" rows="1" placeholder="Message AURA..." style="background-color: #000000 !important; color: #ffffff !important;" class="w-full px-2 py-1 text-sm focus:outline-none resize-none max-h-24"></textarea>
              
              <div class="flex items-center justify-between mt-1 pt-1 border-t border-gray-800">
                <input type="file" id="fileAttach" accept="image/*,text/*,.js,.jsx,.py,.html,.css,.json,.ts,.tsx" class="hidden">
                <button id="btnAttach" class="text-orange text-xs flex items-center gap-1 font-semibold cursor-pointer">📎 Attach File/Photo</button>
                <button id="btnSend" class="px-3 py-1.5 bg-orange text-black font-bold rounded-lg text-xs cursor-pointer">Send</button>
              </div>
            </div>

          </div>
        </div>

      </main>
    </section>
  </div>

  <script type="module">
    import { initializeApp } from "firebase/app";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "firebase/auth";
    import { getFirestore, doc, setDoc, onSnapshot } from "firebase/firestore";

    const firebaseConfig = {
      apiKey: "AIzaSyDTAqb0waoaoSDrwOa2UXRjwl8wmSyXUs0",
      authDomain: "my-wyticle-id.firebaseapp.com",
      projectId: "my-wyticle-id",
      storageBucket: "my-wyticle-id.firebasestorage.app",
      messagingSenderId: "634169882815",
      appId: "1:634169882815:web:486d39a13ce2f855c0ae0a"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUser = null, chats = [], currentChatId = null, attachmentData = null;

    const welcomePage = document.getElementById('welcomePage');
    const authPage = document.getElementById('authPage');
    const chatPage = document.getElementById('chatPage');
    const sidebar = document.getElementById('sidebar');
    const sidebarOverlay = document.getElementById('sidebarOverlay');
    const chatInput = document.getElementById('chatInput');
    const btnSend = document.getElementById('btnSend');
    const messagesContainer = document.getElementById('messagesContainer');
    const emptyGreeting = document.getElementById('emptyGreeting');
    const chatHistoryList = document.getElementById('chatHistoryList');

    lucide.createIcons();

    // Sidebar Collapsible Toggles
    function openSidebar() {
      sidebar.classList.remove('-translate-x-full');
      sidebarOverlay.classList.remove('opacity-0', 'pointer-events-none');
    }
    function closeSidebar() {
      sidebar.classList.add('-translate-x-full');
      sidebarOverlay.classList.add('opacity-0', 'pointer-events-none');
    }
    document.getElementById('btnToggleSidebar').onclick = () => {
      if (sidebar.classList.contains('-translate-x-full')) openSidebar();
      else closeSidebar();
    };
    document.getElementById('btnCloseSidebar').onclick = closeSidebar;
    sidebarOverlay.onclick = closeSidebar;

    document.getElementById('btnStartCoding').onclick = () => { authPage.classList.remove('hidden'); welcomePage.classList.add('hidden'); };
    document.getElementById('btnWelcomeLogin').onclick = () => { authPage.classList.remove('hidden'); welcomePage.classList.add('hidden'); };
    document.getElementById('btnBackToWelcome').onclick = () => { authPage.classList.add('hidden'); welcomePage.classList.remove('hidden'); };

    document.getElementById('authForm').onsubmit = async (e) => {
      e.preventDefault();
      try {
        await signInWithEmailAndPassword(auth, document.getElementById('inputEmail').value, document.getElementById('inputPassword').value);
      } catch {
        await createUserWithEmailAndPassword(auth, document.getElementById('inputEmail').value, document.getElementById('inputPassword').value);
      }
    };

    onAuthStateChanged(auth, (user) => {
      currentUser = user;
      if (user) { chatPage.classList.remove('hidden'); welcomePage.classList.add('hidden'); authPage.classList.add('hidden'); loadChats(); }
      else { welcomePage.classList.remove('hidden'); chatPage.classList.add('hidden'); }
    });

    document.getElementById('btnNewChat').onclick = createNewChat;
    document.getElementById('btnHeaderNewChat').onclick = createNewChat;

    function createNewChat() {
      currentChatId = Date.now().toString();
      chats.unshift({ id: currentChatId, title: "New Chat", messages: [] });
      renderChatHistory(); renderMessages();
      if (window.innerWidth < 768) closeSidebar();
    }

    function saveChats() {
      if (!currentUser) return;
      localStorage.setItem(`aura_chats_${currentUser.uid}`, JSON.stringify(chats));
      setDoc(doc(db, "users", currentUser.uid), { chats: chats }, { merge: true });
    }

    function loadChats() {
      if (!currentUser) return;
      const local = localStorage.getItem(`aura_chats_${currentUser.uid}`);
      if (local) { chats = JSON.parse(local); renderChatHistory(); }
    }

    function renderChatHistory() {
      chatHistoryList.innerHTML = "";
      chats.forEach(c => {
        const div = document.createElement('div');
        div.className = `p-2.5 rounded-xl text-xs cursor-pointer flex items-center justify-between ${c.id === currentChatId ? 'bg-orange/20 text-orange border border-orange/30' : 'text-gray-300 hover:bg-darkBg'}`;
        div.innerHTML = `<span class="truncate">${c.title}</span>`;
        div.onclick = () => { currentChatId = c.id; renderChatHistory(); renderMessages(); if (window.innerWidth < 768) closeSidebar(); };
        chatHistoryList.appendChild(div);
      });
    }

    function renderMessages() {
      const active = chats.find(c => c.id === currentChatId);
      if (!active || active.messages.length === 0) { emptyGreeting.classList.remove('hidden'); messagesContainer.classList.add('hidden'); return; }
      emptyGreeting.classList.add('hidden'); messagesContainer.classList.remove('hidden');
      messagesContainer.innerHTML = "";
      
      active.messages.forEach(m => {
        const d = document.createElement('div');
        d.className = `flex flex-col ${m.role === 'user' ? 'items-end' : 'items-start'} mb-4`;
        const inner = document.createElement('div');
        inner.className = `max-w-[85%] p-3.5 rounded-2xl text-sm ${m.role === 'user' ? 'bg-orange text-black font-medium rounded-tr-none' : 'bg-panelBg text-white border border-borderDark rounded-tl-none shadow-lg'}`;

        // Render Image as Image Card
        if (m.attachment && m.attachment.isImage && m.attachment.data) {
          const img = document.createElement('img');
          img.src = m.attachment.data;
          img.className = "max-w-full max-h-56 rounded-xl mb-2 object-cover border border-black/30 shadow";
          inner.appendChild(img);
        }

        // Render File at Top of Request if present
        if (m.attachment && !m.attachment.isImage && m.attachment.name) {
          const fileCard = document.createElement('div');
          fileCard.className = "mb-2 p-2 bg-black/30 border border-orange/40 rounded-xl flex items-center gap-2 text-xs font-mono text-orange";
          fileCard.innerHTML = `<i data-lucide="file-code" class="w-4 h-4 shrink-0"></i><span class="truncate">${m.attachment.name}</span>`;
          inner.appendChild(fileCard);
        }

        if (m.text) {
          if (m.role === 'assistant') {
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = marked.parse(m.text);
            tempDiv.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
            inner.appendChild(tempDiv);
          } else {
            const p = document.createElement('p'); p.textContent = m.text; inner.appendChild(p);
          }
        }
        d.appendChild(inner);
        messagesContainer.appendChild(d);
      });
      lucide.createIcons();
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    // ATTACHMENT PIPELINE
    document.getElementById('btnAttach').onclick = () => document.getElementById('fileAttach').click();
    document.getElementById('fileAttach').onchange = (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const isImage = file.type.startsWith('image/');
      const reader = new FileReader();

      if (isImage) {
        reader.onload = (event) => {
          const dataUrl = event.target.result;
          attachmentData = { name: file.name, mimeType: file.type, data: dataUrl, isImage: true };
          const thumb = document.getElementById('imgPreviewThumb');
          thumb.src = dataUrl;
          thumb.classList.remove('hidden');
          document.getElementById('previewFileIcon').classList.add('hidden');
          document.getElementById('attachmentName').textContent = file.name;
          document.getElementById('attachmentPreview').classList.remove('hidden');
        };
        reader.readAsDataURL(file);
      } else {
        reader.onload = (event) => {
          attachmentData = { name: file.name, content: event.target.result, isImage: false };
          document.getElementById('imgPreviewThumb').classList.add('hidden');
          const fileIcon = document.getElementById('previewFileIcon');
          fileIcon.classList.remove('hidden');
          document.getElementById('attachmentName').textContent = file.name;
          document.getElementById('attachmentPreview').classList.remove('hidden');
          lucide.createIcons();
        };
        reader.readAsText(file);
      }
    };

    document.getElementById('btnRemoveAttachment').onclick = () => {
      attachmentData = null;
      document.getElementById('fileAttach').value = "";
      document.getElementById('attachmentPreview').classList.add('hidden');
    };

    btnSend.onclick = handleSend;
    function handleSend() {
      const text = chatInput.value.trim();
      if (!text && !attachmentData) return;
      const att = attachmentData;

      attachmentData = null;
      document.getElementById('fileAttach').value = "";
      document.getElementById('attachmentPreview').classList.add('hidden');
      chatInput.value = "";

      if (!currentChatId) {
        currentChatId = Date.now().toString();
        chats.unshift({ id: currentChatId, title: text.slice(0, 20) || "Media Chat", messages: [] });
      }

      const active = chats.find(c => c.id === currentChatId);
      active.messages.push({ role: 'user', text: text, attachment: att });
      saveChats(); renderChatHistory(); renderMessages(); callAI();
    }

    async function callAI() {
      const active = chats.find(c => c.id === currentChatId);
      const lastUser = active.messages[active.messages.length - 1];
      const aiMsg = { role: 'assistant', text: "Thinking..." };
      active.messages.push(aiMsg);
      renderMessages();

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-User-Email': currentUser.email },
          body: JSON.stringify({
            messages: active.messages.slice(0, -1).map(m => ({ role: m.role, content: m.text })),
            prompt: lastUser.text,
            attachment: lastUser.attachment
          })
        });
        const data = await res.json();
        aiMsg.text = data.text || "Error processing.";
      } catch (err) {
        aiMsg.text = "Connection error.";
      }
      saveChats(); renderMessages();
    }
  </script>
</body>
</html>
