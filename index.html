<!DOCTYPE html>

<head>

<title>AURA AI Pro</title>
<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
    * { font-family: 'Inter', sans-serif; }
  html, body { height: 100%; background: #020202; color: #e5e5e5; overflow: hidden; margin:0; }
  .gradient-bg { background: radial-gradient(circle at 50% 20%, #FF7A0020 0%, #020202 50%); }
.aura-orange { color: #FF7A00; }
.bubble { max-width: 85%; padding: 14px; border-radius: 16px; word-wrap: break-word; line-height: 1.6; }
.bubble-user { background: #1a1a1a; border: 1px solid #FF7A00; margin-left: auto; }
.bubble-ai { background: #111; margin-right: auto; }
.prose h1 { font-size: 1.5rem; font-weight: 800; margin:.8rem 0; }
.prose h2 { font-size: 1.2rem; font-weight: 700; margin:.6rem 0; }
.prose a { color: #22c55e; text-decoration: underline; }
.code-block { background: #0a0a0a; border: 1px solid #333; border-radius: 10px; padding: 14px; margin: 1rem 0; position: relative; }
.code-block button { position: absolute; top: 8px; right: 8px; background:#222; padding:4px 8px; border-radius:6px; }
  #chat { height: calc(100dvh - 160px); }
  #inputBar { position: fixed; bottom: 0; left: 0; right: 0; background:linear-gradient(to top, #020202 70%, transparent); padding-bottom: env(safe-area-inset-bottom); }
  @keyframes fadeIn { from{opacity:0; transform:translateY(20px)} to{opacity:1; transform:translateY(0)} }
.fade-in { animation: fadeIn .8s ease; }
.hidden { display: none!important; }
.send-btn { box-shadow: 0 0 20px #FF7A0040; transition: .2s; } .send-btn:active { transform: scale(.95); }
</style>
</head>
<body>

<!-- PRO WELCOME SCREEN -->
<div id="welcome" class="h-screen gradient-bg flex-col items-center justify-center p-6 text-center">
  <div class="fade-in">
    <h1 class="text-6xl font-extrabold aura-orange mb-3 tracking-tight">AURA</h1>
    <p class="text-gray-400 text-lg mb-10">Your Intelligent AI Assistant<br>Fast. Human. Powerful.</p>
    
    <div class="grid grid-cols-2 gap-3 mb-10 w-full max-w-sm">
      <div class="bg-[#111]/60 backdrop-blur p-4 rounded-xl border border-[#222]">⚡<br><span class="text-sm font-semibold">Instant Answers</span></div>
      <div class="bg-[#111]/60 backdrop-blur p-4 rounded-xl border-[#222]">🧠<br><span class="text-sm font-semibold">Smart Reasoning</span></div>
      <div class="bg-[#111]/60 backdrop-blur p-4 rounded-xl border border-[#222]">📎<br><span class="text-sm font-semibold">File & Image</span></div>
      <div class="bg-[#111]/60 backdrop-blur p-4 rounded-xl border border-[#222]">💾<br><span class="text-sm font-semibold">Save History</span></div>
    </div>

    <button id="startBtn" class="bg-[#FF7A00] hover:bg-[#ff8c1a] text-black font-bold py-4 px-10 rounded-xl text-lg shadow-lg shadow-[#FF7A0040] transition">
      Start Chatting
    </button>
    <p class="text-xs text-gray-500 mt-6">Powered by Groq Llama 3.3</p>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden h-screen flex-col">
  <header class="p-4 border-b border-[#222] flex justify-between items-center flex-shrink-0">
    <button id="menuBtn" class="text-2xl">☰</button>
    <h1 class="text-xl font-bold aura-orange">AURA AI</h1>
    <button id="plusBtn" class="text-2xl">+</button>
  </header>

  <div id="chat" class="overflow-y-auto p-4 space-y-4"></div>

  <!-- PRO INPUT BAR WITH BIG SEND BUTTON -->
  <div id="inputBar" class="p-3 border-t border-[#222]">
    <div id="preview" class="hidden mb-2"></div>
    <form id="form" class="flex gap-2 items-end">
      <button type="button" id="attachBtn" class="p-3 text-xl">📎</button>
      <button type="button" id="cameraBtn" class="p-3 text-xl">📷</button>
      <input type="file" id="fileInput" accept="image/*" class="hidden">
      <input id="input" autocomplete="off" class="flex-1 bg-[#111] p-4 rounded-2xl border border-[#333] focus:border-[#FF7A00] outline-none text-base" placeholder="Ask AURA anything...">
      
      <!-- BIG VISIBLE SEND BUTTON -->
      <button type="submit" class="send-btn bg-[#FF7A00] hover:bg-[#ff8c1a] text-black p-4 rounded-2xl font-bold">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </form>
  </div>
</div>
