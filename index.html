<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>AURA AI Pro</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
    * { font-family: 'Inter', sans-serif; }
  body { background: #000; color: #e5e5e5; overflow: hidden; }
 .glass { background: rgba(17,17,17,0.6); backdrop-filter: blur(10px); border: 1px solid rgba(255,122,0,0.2); }
 .aura-gradient { background: linear-gradient(135deg, #FF7A00 0%, #FF5500 100%); }
 .bubble { max-width: 85%; padding: 14px 16px; border-radius: 18px; line-height: 1.6; animation: slideUp.3s ease; }
  @keyframes slideUp { from{opacity:0; transform:translateY(10px)} to{opacity:1; transform:translateY(0)} }
 .bubble-user { background: #1a1a1a; border: 1px solid #FF7A00; margin-left: auto; }
 .bubble-ai { background: #0f0f0f; margin-right: auto; }
 .prose a { color: #22c55e; text-decoration: underline; }
 .prose h1 { font-size: 1.4rem; font-weight: 800; margin:.8rem 0; }
 .prose h2 { font-size: 1.1rem; font-weight: 700; margin:.6rem 0; }
 .prose table { border-collapse: collapse; width:100%; margin:1rem 0; font-size: 14px; }
 .prose td,.prose th { border:1px solid #333; padding:8px; }
 .code-block { background: #020202; border: 1px solid #333; border-radius: 12px; padding: 14px; margin: 1rem 0; position: relative; }
 .code-block button { position: absolute; top: 8px; right: 8px; background:#222; padding:4px 10px; border-radius:6px; font-size:12px; }
  #chat { height: calc(100dvh - 170px); }
 .typing-dot { width: 8px; height: 8px; background: #FF7A00; border-radius: 50%; display: inline-block; animation: bounce 1.4s infinite; }
 .typing-dot:nth-child(2) { animation-delay:.2s; }.typing-dot:nth-child(3) { animation-delay:.4s; }
  @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-6px); }
  #sidebar { position: fixed; top:0; left:0; height:100%; width:300px; background:#050505; z-index:50; transform:translateX(-100%); transition:.3s; }
  #sidebar.open { transform:translateX(0); }
  #overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:#000c; z-index:40; }
 .preview-img { max-width: 120px; max-height: 120px; border-radius: 12px; border: 1px solid #FF7A00; }
</style>
</head>
<body>

<!-- SIDEBAR -->
<div id="sidebar" class="p-4"><h2 class="text-xl font-bold text-[#FF7A00] mb-4">History</h2><div id="chatList" class="space-y-2"></div></div>
<div id="overlay" class="hidden"></div>

<!-- MAIN APP - ONLY 1 SCREEN NOW -->
<div id="app" class="h-screen flex flex-col">
  
  <!-- WELCOME / HEADER -->
  <header id="header" class="p-4 glass flex justify-between items-center flex-shrink-0">
    <button id="menuBtn" class="text-2xl">☰</button>
    <div class="text-center">
      <h1 class="text-xl font-extrabold text-[#FF7A00]">AURA</h1>
      <p class="text-xs text-gray-400">AI Assistant</p>
    </div>
    <button id="plusBtn" class="text-2xl">+</button>
  </header>

  <!-- WELCOME CONTENT -->
  <div id="welcomeContent" class="flex-1 flex flex-col items-center justify-center p-6 text-center">
    <h1 class="text-5xl font-extrabold text-[#FF7A00] mb-3">Welcome to AURA</h1>
    <p class="text-gray-400 mb-8">Your funny, smart AI bestie 😎</p>
    <div class="grid grid-cols-2 gap-3 mb-8 w-full max-w-sm">
      <div class="glass p-4 rounded-xl">⚡<br><span class="text-sm">Instant</span></div>
      <div class="glass p-4 rounded-xl">🧠<br><span class="text-sm">Smart</span></div>
      <div class="glass p-4 rounded-xl">📎<br><span class="text-sm">Files</span></div>
      <div class="glass p-4 rounded-xl">💾<br><span class="text-sm">Memory</span></div>
    </div>
    <button id="startBtn" class="aura-gradient text-black font-bold py-4 px-10 rounded-xl text-lg shadow-lg">Start Chatting</button>
  </div>

  <!-- CHAT CONTENT -->
  <div id="chatContent" class="hidden flex-1 flex flex-col">
    <div id="chat" class="overflow-y-auto p-4 space-y-4"></div>

    <div class="p-3 glass">
      <div id="preview" class="hidden mb-2"></div>
      <form id="form" class="flex gap-2 items-end">
        <button type="button" id="attachBtn" class="p-3 text-xl">📎</button>
        <button type="button" id="cameraBtn" class="p-3 text-xl">📷</button>
        <input type="file" id="fileInput" accept="image/*" class="hidden">
        <input id="input" autocomplete="off" class="flex-1 bg-[#111] p-4 rounded-2xl border-[#333] focus:border-[#FF7A00] outline-none" placeholder="Message AURA...">
        <button type="submit" class="aura-gradient text-black p-4 rounded-2xl font-bold">➤</button>
      </form>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, getDocs, doc, setDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = { apiKey: "AIzaSyDTAqb0waoaoSDrwOa2UXRjwl8wmSyXUs0", projectId: "my-wyticle-id" };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  let currentChatId = Date.now().toString();
  let attachedFile = null;
  let chatStarted = false;

  const welcomeContent = document.getElementById('welcomeContent');
  const chatContent = document.getElementById('chatContent');
  const chat = document.getElementById('chat');

  // FIX: NO MORE STUCK BUTTON. JUST HIDE/SHOW DIVS
  document.getElementById('startBtn').onclick = () => { 
    welcomeContent.classList.add('hidden');
    chatContent.classList.remove('hidden');
    chatStarted = true;
    history.pushState({page: 'chat'}, '');
  }
  document.getElementById('plusBtn').onclick = () => { // New Chat
    chat.innerHTML = '';
    currentChatId = Date.now().toString();
    welcomeContent.classList.remove('hidden');
    chatContent.classList.add('hidden');
    chatStarted = false;
  }

  // MENU + PULL TO REFRESH + BACK BUTTON
  document.getElementById('menuBtn').onclick = () => { document.getElementById('sidebar').classList.add('open'); document.getElementById('overlay').classList.remove('hidden'); }
  document.getElementById('overlay').onclick = () => { document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.add('hidden'); }
  window.addEventListener('popstate', () => { if(chatStarted) document.getElementById('plusBtn').click(); })
  let startY = 0; chat.addEventListener('touchstart', e => startY = e.touches[0].clientY);
  chat.addEventListener('touchend', e => { if(chat.scrollTop === 0 && e.changedTouches[0].clientY - startY > 80) location.reload(); });

  // ATTACH + CAMERA
  document.getElementById('attachBtn').onclick = () => document.getElementById('fileInput').click();
  document.getElementById('cameraBtn').onclick = () => { document.getElementById('fileInput').setAttribute('capture', 'environment'); document.getElementById('fileInput').click(); }
  document.getElementById('fileInput').onchange = (e) => {
    const file = e.target.files[0];
    if(file) { attachedFile = file; const reader = new FileReader(); reader.onload = (ev) => { document.getElementById('preview').innerHTML = `<img src="${ev.target.result}" class="preview-img">`; document.getElementById('preview').classList.remove('hidden'); } reader.readAsDataURL(file); }
  }

  marked.setOptions({ breaks: true });
  const renderer = new marked.Renderer();
  renderer.code = (code) => `<div class="code-block"><button onclick="copyCode(this)">Copy</button><pre><code>${code}</code></pre></div>`;
  marked.setOptions({ renderer });
  function renderMessage(text) { return DOMPurify.sanitize(marked.parse(text)); }

  document.getElementById('form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const msg = document.getElementById('input').value.trim();
    if(!msg &&!attachedFile) return;
    addMessage('user', attachedFile? `[Image] ${msg}` : msg);
    document.getElementById('input').value = ''; document.getElementById('preview').classList.add('hidden');
    await streamAI(msg); attachedFile = null;
  });

  function addMessage(role, content) {
    const div = document.createElement('div');
    div.className = `bubble ${role === 'user'? 'bubble-user' : 'bubble-ai'}`;
    div.innerHTML = `<div class="prose">${renderMessage(content)}</div>`;
    div.innerHTML += `<div class="flex gap-3 mt-2 text-xs text-gray-500"><button onclick="copyMsg(this)">Copy</button><button onclick="redo()">Redo</button><button onclick="delMsg(this)">Delete</button></div>`;
    chat.appendChild(div); setTimeout(() => chat.scrollTop = chat.scrollHeight, 100); return div;
  }

  function showTyping() {
    const div = document.createElement('div');
    div.id = 'typing';
    div.className = 'bubble bubble-ai';
    div.innerHTML = `<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>`;
    chat.appendChild(div); chat.scrollTop = chat.scrollHeight;
  }
  function hideTyping() { document.getElementById('typing')?.remove(); }

  async function streamAI(prompt) {
    showTyping();
    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({messages: [
          {role:'system', content:`You are AURA, a human, funny, and slightly sarcastic AI assistant. Talk like a friend from Nigeria. Use slang, jokes, and emojis 😎🔥 Be warm. Use markdown: # H1 ## H2, **bold**, tables, \`\`code\`\`. Keep replies short.`},
        ...getAllMessages(), {role:'user', content: prompt}
        ]})
      });
      if(!res.ok) throw new Error(await res.text());
      hideTyping();
      const bubble = addMessage('ai', '');
      const contentDiv = bubble.querySelector('.prose');
      const reader = res.body.getReader();
      let text = '';
      while(true) {
        const {done, value} = await reader.read();
        if(done) break;
        text += new TextDecoder().decode(value);
        contentDiv.innerHTML = renderMessage(text);
        chat.scrollTop = chat.scrollHeight;
      }
    } catch(err) { hideTyping(); addMessage('ai', "AURA crashed: " + err.message + " 😭"); }
  }

  function getAllMessages() {
    return [...chat.children].filter(b => b.id!== 'typing').map(b => ({
      role: b.classList.contains('bubble-user')? 'user' : 'assistant',
      content: b.querySelector('.prose').innerText
    }));
  }

  window.copyMsg = (btn) => navigator.clipboard.writeText(btn.closest('.bubble').querySelector('.prose').innerText);
  window.delMsg = (btn) => { btn.closest('.bubble').remove(); }
  window.redo = () => { const lastUser = [...chat.children].reverse().find(b => b.classList.contains('bubble-user')); if(lastUser) streamAI(lastUser.querySelector('.prose').innerText); }
  window.copyCode = (btn) => navigator.clipboard.writeText(btn.nextElementSibling.innerText);
</script>
</body>
   </html>
