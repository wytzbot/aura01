<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
  <title>AURA - Your Coding Partner</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { orange: '#FF5500', darkBg: '#050505', panelBg: '#0F0F0F', borderDark: '#1A1A1A' } } }
    }
  </script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    body { height: 100dvh; background-color: #050505; color: white; font-family: sans-serif; overflow: hidden; }
    .bg-aura { background: radial-gradient(circle at 50% 50%, #1a0800 0%, #050505 100%); }
    .glass { background: rgba(12, 12, 12, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
    
    /* Input stays above keyboard */
    .input-zone { position: fixed; bottom: 0; left: 0; width: 100%; z-index: 50; padding: 10px; }
    
    /* Message Bubbles */
    .user-msg { background: #1a0c00; border: 1px solid rgba(255, 85, 0, 0.2); border-radius: 1.2rem 1.2rem 0 1.2rem; align-self: flex-end; max-width: 85%; }
    .ai-msg { background: #0F0F0F; border: 1px solid #1A1A1A; border-radius: 1.2rem 1.2rem 1.2rem 0; align-self: flex-start; max-width: 85%; }

    .typing-cursor::after { content: '|'; animation: blink 1s infinite; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    
    .chat-scroll { scroll-behavior: smooth; }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
  </style>
</head>
<body class="antialiased">

  <div id="app" class="relative z-10 h-full flex flex-col overflow-hidden">

    <!-- 1. WELCOME PAGE -->
    <section id="welcomePage" class="flex-1 flex flex-col items-center justify-center p-6 text-center bg-aura">
      <div class="max-w-md w-full space-y-12">
        <h1 class="text-7xl font-black tracking-tighter text-white mb-2">AURA</h1>
        <p id="rotatingDesc" class="text-orange font-mono text-sm tracking-widest uppercase typing-cursor h-4"></p>
        <div class="space-y-4">
            <button onclick="showPage('auth')" class="w-full py-4 bg-orange text-black font-bold rounded-2xl shadow-lg active:scale-95 transition">Get Started</button>
        </div>
      </div>
    </section>

    <!-- 2. AUTH PAGE -->
    <section id="authPage" class="hidden flex-1 flex flex-col items-center justify-center p-4">
      <div class="w-full max-w-md bg-panelBg border border-borderDark rounded-[2rem] p-8">
        <h2 class="text-2xl font-bold text-center mb-8">Access AURA</h2>
        <form id="authForm" class="space-y-4">
          <input type="email" id="inputEmail" placeholder="Email" class="w-full bg-black border border-borderDark rounded-xl px-5 py-4 focus:border-orange outline-none" required>
          <input type="password" id="inputPassword" placeholder="Password" class="w-full bg-black border border-borderDark rounded-xl px-5 py-4 focus:border-orange outline-none" required>
          <div id="authError" class="text-red-500 text-xs hidden mb-2"></div>
          <button type="submit" class="w-full py-4 bg-orange text-black font-bold rounded-xl">Continue</button>
        </form>
      </div>
    </section>

    <!-- 3. CHAT PAGE -->
    <section id="chatPage" class="hidden flex-1 flex flex-col h-full bg-darkBg overflow-hidden">
      
      <!-- SIDEBAR -->
      <aside id="sidebar" class="fixed inset-y-0 left-0 w-80 glass border-r border-borderDark z-[60] transform -translate-x-full transition-transform duration-300 flex flex-col">
        <div class="p-5 border-b border-borderDark flex items-center justify-between">
            <span class="font-bold text-orange tracking-tighter text-xl">AURA.AI</span>
            <button onclick="toggleSidebar(false)" class="p-2 text-gray-500"><i data-lucide="x"></i></button>
        </div>
        <div class="p-4 space-y-4">
            <button onclick="createNewChat()" class="w-full py-3 bg-white/5 border border-white/10 rounded-xl flex items-center justify-center gap-2 font-bold hover:bg-orange/10 hover:text-orange transition">
                <i data-lucide="plus" class="w-4 h-4"></i> New Conversation
            </button>
            <div class="relative">
                <i data-lucide="search" class="absolute left-3 top-3 w-4 h-4 text-gray-500"></i>
                <input type="text" id="chatSearch" placeholder="Search chats..." class="w-full bg-black border border-borderDark rounded-xl pl-10 pr-4 py-2.5 text-sm outline-none focus:border-orange">
            </div>
        </div>
        <div id="chatHistoryList" class="flex-1 overflow-y-auto px-4 pb-4 space-y-2"></div>
      </aside>
      <div id="sidebarOverlay" onclick="toggleSidebar(false)" class="fixed inset-0 bg-black/70 z-50 hidden"></div>

      <!-- HEADER -->
      <header class="h-16 flex items-center justify-between px-5 glass border-b border-borderDark shrink-0">
        <button onclick="toggleSidebar(true)" class="p-2 -ml-2 text-gray-400"><i data-lucide="menu"></i></button>
        <span class="text-xs font-mono text-gray-500 uppercase tracking-widest">Workspace</span>
        <button onclick="createNewChat()" class="p-2 -mr-2 text-orange"><i data-lucide="square-pen"></i></button>
      </header>

      <!-- MESSAGES -->
      <main id="messagesContainer" class="flex-1 overflow-y-auto p-4 flex flex-col space-y-6 pb-40 chat-scroll">
        <div id="emptyGreeting" class="h-full flex flex-col items-center justify-center text-center space-y-4 opacity-50">
            <i data-lucide="sparkles" class="w-12 h-12 text-orange"></i>
            <h2 class="text-xl font-bold">What are we building today?</h2>
        </div>
      </main>

      <!-- INPUT BAR -->
      <div class="input-zone">
        <div class="max-w-4xl mx-auto flex flex-col">
            
            <!-- EDITABLE ATTACHMENT THUMBNAIL -->
            <div id="attachmentPreview" class="hidden ml-2 mb-2 self-start animate-in slide-in-from-bottom-2">
                <div class="relative group bg-panelBg border border-orange/40 p-1.5 rounded-2xl flex items-center gap-3 pr-4 shadow-2xl">
                    <img id="imgPreviewThumb" class="w-10 h-10 object-cover rounded-xl hidden">
                    <div id="filePreviewIcon" class="w-10 h-10 bg-black rounded-xl flex items-center justify-center hidden"><i data-lucide="file-code" class="text-orange"></i></div>
                    <div class="flex flex-col">
                        <span id="attachmentName" class="text-[10px] font-mono text-gray-300 truncate max-w-[100px]">file.js</span>
                        <span class="text-[9px] text-orange font-bold uppercase tracking-tighter">Ready</span>
                    </div>
                    <button onclick="removeAttachment()" class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full p-1 shadow-lg active:scale-90 transition">
                        <i data-lucide="x" class="w-3 h-3"></i>
                    </button>
                </div>
            </div>

            <!-- INPUT BOX -->
            <div class="glass border border-white/10 rounded-[2rem] p-2 flex items-end gap-2 shadow-2xl focus-within:border-orange/50 transition-all">
                <button onclick="document.getElementById('fileAttach').click()" class="p-3.5 text-gray-400 hover:text-orange transition active:scale-90">
                    <i data-lucide="plus-circle" class="w-6 h-6"></i>
                </button>
                <textarea id="chatInput" rows="1" placeholder="Ask AURA anything..." class="flex-1 bg-transparent border-none focus:ring-0 text-white py-3.5 px-1 resize-none max-h-40 text-sm outline-none"></textarea>
                <button id="btnSend" onclick="handleSend()" class="p-3.5 bg-orange text-black rounded-full disabled:opacity-20 disabled:grayscale transition active:scale-90 shadow-xl" disabled>
                    <i data-lucide="arrow-up" class="w-6 h-6 stroke-[3]"></i>
                </button>
            </div>
            <input type="file" id="fileAttach" class="hidden" onchange="processFile(this.files[0])">
        </div>
      </div>

    </section>
  </div>

  <script type="module">
    import { initializeApp } from "firebase/app";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "firebase/auth";
    import { getFirestore, doc, setDoc, getDoc } from "firebase/firestore";

    // --- CONFIG ---
    const firebaseConfig = { apiKey: "AIzaSyDTAqb0waoaoSDrwOa2UXRjwl8wmSyXUs0", authDomain: "my-wyticle-id.firebaseapp.com", projectId: "my-wyticle-id", storageBucket: "my-wyticle-id.firebasestorage.app" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUser = null, chats = [], currentChatId = null, attachmentData = null;

    // --- INITIALIZATION ---
    lucide.createIcons();
    startRotatingText();

    onAuthStateChanged(auth, async (user) => {
        currentUser = user;
        if (user) {
            await syncFromFirebase();
            showPage('chat');
            if (chats.length === 0) createNewChat();
            else { currentChatId = chats[0].id; renderMessages(); renderHistory(); }
        } else {
            showPage('welcome');
        }
    });

    // --- CORE LOGIC ---
    async function syncToFirebase() {
        if (!currentUser) return;
        localStorage.setItem(`aura_local_${currentUser.uid}`, JSON.stringify(chats));
        await setDoc(doc(db, "users", currentUser.uid), { chats }, { merge: true });
    }

    async function syncFromFirebase() {
        const local = localStorage.getItem(`aura_local_${currentUser.uid}`);
        if (local) chats = JSON.parse(local);
        
        const snap = await getDoc(doc(db, "users", currentUser.uid));
        if (snap.exists() && snap.data().chats) {
            chats = snap.data().chats;
        }
    }

    window.createNewChat = () => {
        currentChatId = Date.now().toString();
        chats.unshift({ id: currentChatId, title: "New Conversation", messages: [] });
        renderHistory();
        renderMessages();
        toggleSidebar(false);
    };

    window.processFile = (file) => {
        if (!file) return;
        const reader = new FileReader();
        const isImage = file.type.startsWith('image/');
        
        reader.onload = (e) => {
            attachmentData = {
                name: file.name,
                isImage,
                mimeType: file.type,
                data: isImage ? e.target.result : null,
                content: !isImage ? e.target.result : null
            };
            document.getElementById('attachmentPreview').classList.remove('hidden');
            document.getElementById('attachmentName').textContent = file.name;
            if (isImage) {
                document.getElementById('imgPreviewThumb').src = e.target.result;
                document.getElementById('imgPreviewThumb').classList.remove('hidden');
                document.getElementById('filePreviewIcon').classList.add('hidden');
            } else {
                document.getElementById('filePreviewIcon').classList.remove('hidden');
                document.getElementById('imgPreviewThumb').classList.add('hidden');
            }
            document.getElementById('btnSend').disabled = false;
            lucide.createIcons();
        };
        if (isImage) reader.readAsDataURL(file); else reader.readAsText(file);
    };

    window.removeAttachment = () => {
        attachmentData = null;
        document.getElementById('attachmentPreview').classList.add('hidden');
        checkSendBtn();
    };

    window.handleSend = async () => {
        const text = chatInput.value.trim();
        if (!text && !attachmentData) return;

        const active = chats.find(c => c.id === currentChatId);
        const userMsg = { role: 'user', text, attachment: attachmentData };
        active.messages.push(userMsg);
        if (active.title === "New Conversation" && text) active.title = text.slice(0, 30);

        // Reset UI
        const sentAttachment = attachmentData;
        chatInput.value = "";
        chatInput.style.height = "auto";
        removeAttachment();
        renderMessages();

        // AI Message Shell
        const aiMsg = { role: 'assistant', text: "● ● ●" };
        active.messages.push(aiMsg);
        renderMessages();

        try {
            const res = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    prompt: text,
                    messages: active.messages.slice(0, -2).map(m => ({ role: m.role, content: m.text })),
                    attachment: sentAttachment ? {
                        name: sentAttachment.name,
                        mimeType: sentAttachment.mimeType,
                        base64: sentAttachment.isImage ? sentAttachment.data.split(',')[1] : null,
                        content: sentAttachment.content,
                        isImage: sentAttachment.isImage
                    } : null
                })
            });
            const data = await res.json();
            aiMsg.text = data.text;
        } catch (e) {
            aiMsg.text = "Connection Error. Check your internet or API.";
        }
        
        renderMessages();
        syncToFirebase();
        renderHistory();
    };

    // --- UI RENDERING ---
    function renderMessages() {
        const container = document.getElementById('messagesContainer');
        const active = chats.find(c => c.id === currentChatId);
        if (!active || active.messages.length === 0) {
            document.getElementById('emptyGreeting').classList.remove('hidden');
            container.innerHTML = ""; return;
        }
        document.getElementById('emptyGreeting').classList.add('hidden');
        container.innerHTML = "";

        active.messages.forEach(m => {
            const wrap = document.createElement('div');
            wrap.className = `flex flex-col ${m.role === 'user' ? 'items-end' : 'items-start'} animate-in fade-in slide-in-from-bottom-2`;
            
            const bubble = document.createElement('div');
            bubble.className = `p-4 shadow-xl ${m.role === 'user' ? 'user-msg' : 'ai-msg'}`;
            
            if (m.attachment?.isImage) {
                bubble.innerHTML += `<img src="${m.attachment.data}" class="max-w-full rounded-xl mb-3 border border-white/10">`;
            } else if (m.attachment) {
                bubble.innerHTML += `<div class="p-2 bg-black/40 rounded flex items-center gap-2 mb-3 text-[10px] text-orange font-mono"><i data-lucide="file-text" class="w-3 h-3"></i> ${m.attachment.name}</div>`;
            }

            const text = document.createElement('div');
            text.className = "prose prose-invert prose-sm max-w-none";
            text.innerHTML = marked.parse(m.te
