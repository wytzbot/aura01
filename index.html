<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AURA - Your Coding Partner</title>

  <!-- External Resources -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { orange: '#FF5500', darkBg: '#050505', panelBg: '#0F0F0F', borderDark: '#1A1A1A' } } }
    }
  </script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    body { height: 100dvh; background-color: #050505; color: white; font-family: sans-serif; overflow: hidden; }
    .bg-aura { background: radial-gradient(circle at 50% 50%, #1a0800 0%, #050505 100%); }
    .glass { background: rgba(15, 15, 15, 0.8); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
    
    .input-wrapper { position: sticky; bottom: 0; width: 100%; padding: 1rem; z-index: 50; }
    .user-msg { background: #1a0c00; border: 1px solid rgba(255, 85, 0, 0.3); border-radius: 1.2rem 1.2rem 0 1.2rem; align-self: flex-end; max-width: 85%; padding: 12px 16px; }
    .ai-msg { background: #0F0F0F; border: 1px solid #1A1A1A; border-radius: 1.2rem 1.2rem 1.2rem 0; align-self: flex-start; max-width: 85%; padding: 12px 16px; }

    .typing-cursor::after { content: '|'; animation: blink 1s infinite; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
  </style>
</head>
<body class="antialiased">

  <div id="app" class="relative z-10 h-full flex flex-col overflow-hidden">

    <!-- 1. WELCOME PAGE -->
    <section id="welcomePage" class="flex-1 flex flex-col items-center justify-center p-6 text-center bg-aura">
      <div class="max-w-md w-full space-y-12">
        <div>
            <h1 class="text-7xl font-black tracking-tighter text-white mb-2">AURA</h1>
            <div class="h-6">
                <p id="rotatingDesc" class="text-orange font-mono text-sm tracking-widest uppercase typing-cursor"></p>
            </div>
        </div>
        <div class="space-y-4">
            <button onclick="showPage('auth')" class="w-full py-4 bg-orange text-black font-bold rounded-2xl shadow-lg active:scale-95 transition">Get Started</button>
            <button onclick="showPage('auth')" class="w-full py-4 bg-white/5 border border-white/10 text-white font-medium rounded-2xl hover:bg-white/10">Log In</button>
        </div>
      </div>
    </section>

    <!-- 2. AUTH PAGE (Login/Signup) -->
    <section id="authPage" class="hidden flex-1 flex flex-col items-center justify-center p-4">
      <div class="w-full max-w-md bg-panelBg border border-borderDark rounded-[2rem] p-8 relative">
        <button onclick="showPage('welcome')" class="mb-6 text-gray-500 hover:text-white flex items-center gap-2">
            <i data-lucide="arrow-left"></i> Back
        </button>
        <h2 class="text-2xl font-bold text-center mb-8">Access AURA</h2>
        <form id="authForm" class="space-y-4">
          <input type="email" id="inputEmail" placeholder="Email" class="w-full bg-black border border-borderDark rounded-xl px-5 py-4 focus:border-orange outline-none" required>
          <input type="password" id="inputPassword" placeholder="Password" class="w-full bg-black border border-borderDark rounded-xl px-5 py-4 focus:border-orange outline-none" required>
          <button type="submit" class="w-full py-4 bg-orange text-black font-bold rounded-xl mt-2">Continue</button>
        </form>
      </div>
    </section>

    <!-- 3. CHAT PAGE -->
    <section id="chatPage" class="hidden flex-1 flex flex-col h-full bg-darkBg">
      <header class="h-16 flex items-center justify-between px-5 glass border-b border-borderDark shrink-0">
        <div class="flex items-center gap-3">
            <button id="btnToggleSidebar" onclick="toggleSidebar(true)" class="text-gray-400"><i data-lucide="menu"></i></button>
            <span class="text-sm font-bold tracking-tight">AURA AI</span>
        </div>
        <button onclick="location.reload()" class="text-orange bg-orange/10 p-2 rounded-lg"><i data-lucide="plus"></i></button>
      </header>

      <div id="sidebar" class="fixed inset-y-0 left-0 w-72 glass border-r border-borderDark z-[60] transform -translate-x-full transition-transform duration-300 flex flex-col">
        <div class="p-6 border-b border-borderDark flex justify-between">
            <span class="font-bold">History</span>
            <button onclick="toggleSidebar(false)"><i data-lucide="x" class="w-5 h-5"></i></button>
        </div>
        <div class="flex-1 p-4 text-gray-500 text-sm">No recent chats</div>
      </div>
      <div id="sidebarOverlay" onclick="toggleSidebar(false)" class="fixed inset-0 bg-black/60 z-50 hidden"></div>

      <main class="flex-1 overflow-y-auto p-4 flex flex-col space-y-4" id="messagesContainer">
        <div id="emptyGreeting" class="h-full flex flex-col items-center justify-center text-center space-y-4">
            <div class="w-16 h-16 bg-orange/10 rounded-full flex items-center justify-center text-orange">
                <i data-lucide="sparkles" class="w-8 h-8"></i>
            </div>
            <h2 class="text-2xl font-bold">Hello. I am AURA.</h2>
            <p class="text-gray-500 text-xs font-mono">How can I help you code today?</p>
        </div>
      </main>

      <div class="input-wrapper">
        <div class="max-w-3xl mx-auto flex gap-2">
            <input type="text" id="userInput" placeholder="Ask anything..." class="flex-1 bg-panelBg border border-borderDark rounded-xl px-4 py-3 focus:border-orange outline-none">
            <button onclick="sendMessage()" class="bg-orange text-black p-3 rounded-xl"><i data-lucide="send"></i></button>
        </div>
      </div>
    </section>
  </div>

  <script>
    // 1. Navigation Logic
    function showPage(pageId) {
      document.getElementById('welcomePage').classList.add('hidden');
      document.getElementById('authPage').classList.add('hidden');
      document.getElementById('chatPage').classList.add('hidden');
      document.getElementById(pageId + 'Page').classList.remove('hidden');
      lucide.createIcons();
    }

    // 2. Auth Logic
    document.getElementById('authForm').addEventListener('submit', (e) => {
      e.preventDefault();
      // Simulate Login
      showPage('chat');
    });

    // 3. Sidebar Logic
    function toggleSidebar(open) {
      const sb = document.getElementById('sidebar');
      const overlay = document.getElementById('sidebarOverlay');
      if(open) {
        sb.classList.remove('-translate-x-full');
        overlay.classList.remove('hidden');
      } else {
        sb.classList.add('-translate-x-full');
        overlay.classList.add('hidden');
      }
    }

    // 4. Chat Logic
    function sendMessage() {
      const input = document.getElementById('userInput');
      const container = document.getElementById('messagesContainer');
      const greeting = document.getElementById('emptyGreeting');

      if(!input.value.trim()) return;

      if(greeting) greeting.remove();

      // User Message
      const userDiv = document.createElement('div');
      userDiv.className = 'user-msg';
      userDiv.textContent = input.value;
      container.appendChild(userDiv);

      // Simple AI Response simulation
      setTimeout(() => {
        const aiDiv = document.createElement('div');
        aiDiv.className = 'ai-msg';
        aiDiv.textContent = "I'm AURA. I received your message: " + input.value;
        container.appendChild(aiDiv);
        container.scrollTop = container.scrollHeight;
      }, 600);

      input.value = '';
      container.scrollTop = container.scrollHeight;
    }

    // 5. Typing Animation for Welcome Screen
    const phrases = ["Coding Partner", "AI Assistant", "Problem Solver"];
    let i = 0, j = 0, isDeleting = false;
    function type() {
      const target = document.getElementById('rotatingDesc');
      if(!target) return;
      const currentPhrase = phrases[i];
      target.textContent = currentPhrase.substring(0, j);
      
      if(!isDeleting && j < currentPhrase.length) { j++; setTimeout(type, 100); }
      else if(isDeleting && j > 0) { j--; setTimeout(type, 50); }
      else {
        isDeleting = !isDeleting;
        if(!isDeleting) i = (i + 1) % phrases.length;
        setTimeout(type, 1500);
      }
    }

    // Initialize
    window.onload = () => {
        lucide.createIcons();
        type();
    };
  </script>
</body>
</html>
