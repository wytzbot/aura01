<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
  <title>AURA - Your Coding Partner</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            orange: '#FF5500',
            darkOrange: '#CC4400',
            darkBg: '#080808',
            panelBg: '#121212',
            borderDark: '#222222',
          }
        }
      }
    }
  </script>

  <!-- Highlight.js for Syntax Highlighting -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

  <!-- Marked for Markdown Parsing -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Import Maps for Firebase ESM -->
  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
      }
    }
  </script>

  <style>
    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .bg-animated {
      background: linear-gradient(-45deg, #000000, #0c0300, #1f0800, #330e00, #000000);
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
    }
    .text-orange-gradient {
      background: linear-gradient(135deg, #ffffff 0%, #FF5500 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    canvas {
      position: absolute;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 1;
    }
    .content-zone {
      position: relative;
      z-index: 2;
    }
    #pullSpinner {
      transition: transform 0.2s ease, opacity 0.2s ease;
    }
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #080808;
    }
    ::-webkit-scrollbar-thumb {
      background: #222222;
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #FF5500;
    }
  </style>
</head>
<body class="bg-darkBg text-gray-100 font-sans antialiased h-[100dvh] overflow-hidden flex flex-col select-none">

  <!-- Dynamic Orange Canvas Particles -->
  <canvas id="particleCanvas"></canvas>

  <!-- Pull To Refresh Visual Indicator -->
  <div id="pullSpinner" class="fixed top-2 left-1/2 -translate-x-1/2 z-50 bg-panelBg border border-orange/30 text-orange p-2 rounded-full shadow-lg opacity-0 pointer-events-none transition-all flex items-center gap-2 text-xs">
    <i data-lucide="rotate-cw" class="w-4 h-4 animate-spin"></i>
    <span>Refreshing...</span>
  </div>

  <!-- App Wrapper -->
  <div id="app" class="content-zone flex-1 flex flex-col h-full overflow-hidden">

    <!-- WELCOME PAGE -->
    <section id="welcomePage" class="flex-1 flex flex-col items-center justify-center p-6 text-center bg-animated h-full">
      <div class="max-w-md w-full flex flex-col items-center space-y-8">
        <div class="space-y-3">
          <div class="inline-flex items-center justify-center p-3 bg-orange/10 rounded-2xl border border-orange/20 mb-2">
            <i data-lucide="sparkles" class="w-10 h-10 text-orange"></i>
          </div>
          <h1 class="text-5xl font-black tracking-tight text-orange-gradient">AURA</h1>
          <div class="h-8 flex items-center justify-center">
            <p id="rotatingText" class="text-gray-400 font-medium text-lg transition-opacity duration-500 opacity-100">Your Coding Partner</p>
          </div>
        </div>

        <div class="w-full space-y-3 pt-4">

            <span>Start Coding</span>

    </section>

    <!-- AUTH PAGE -->
    <section id="authPage" class="hidden flex-1 flex flex-col items-center justify-center p-4 bg-darkBg h-full overflow-y-auto">
      <div class="w-full max-w-md bg-panelBg border border-borderDark rounded-2xl p-6 sm:p-8 shadow-2xl relative my-auto">

        </div>

        <button id="btnGoogleAuth" class="w-full py-3 px-4 bg-darkBg border border-borderDark hover:border-gray-700 rounded-xl text-sm font-medium text-gray-200 flex items-center justify-center gap-3 transition active:scale-95 mb-5">
          <svg class="w-4 h-4" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z"/>

              <button type="button" class="btnTogglePass absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-white">

            <div class="relative">

              <button type="button" class="btnTogglePass absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-white">
                <i data-lucide="eye" class="w-4 h-4"></i>

          <div class="flex justify-end">

        <div class="text-center mt-6">
          <button id="btnToggleAuthMode" class="text-xs text-gray-400 hover:text-white">

    <!-- CHAT PAGE -->
    <section id="chatPage" class="hidden flex-1 flex h-full overflow-hidden bg-darkBg relative">

      <div id="sidebarOverlay" class="fixed inset-0 bg-black/60 z-30 opacity-0 pointer-events-none transition-opacity md:hidden"></div>

      <!-- Sidebar -->
      <aside id="sidebar" class="fixed md:static inset-y-0 left-0 w-72 bg-panelBg border-r border-borderDark z-40 transform -translate-x-full md:translate-x-0 transition-transform duration-300 flex flex-col h-full">
        <div class="p-4 border-b border-borderDark flex items-center justify-between">
          <div class="flex items-center gap-2">
            <i data-lucide="sparkles" class="w-5 h-5 text-orange"></i>
            <span class="font-bold text-white tracking-wide">AURA AI</span>
          </div>
          <div class="flex items-center gap-1">
            <button id="btnNewChat" class="p-2 text-orange hover:bg-darkBg rounded-lg transition border border-orange/20 flex items-center gap-1 text-xs font-semibold">
              <i data-lucide="plus" class="w-4 h-4"></i>
              <span>New</span>
            </button>
            <button id="btnCloseSidebar" class="p-2 text-gray-400 hover:text-white md:hidden">
              <i data-lucide="x" class="w-5 h-5"></i>
            </button>
          </div>
        </div>

        <div class="p-3">
          <div class="relative">
            <i data-lucide="search" class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-gray-500"></i>
            <input type="text" id="inputSearchChats" placeholder="Search chats..." class="w-full bg-darkBg border border-borderDark rounded-xl pl-9 pr-3 py-2 text-xs text-white focus:outline-none focus:border-orange">

        </div>

        <div id="chatHistoryList" class="flex-1 overflow-y-auto px-3 space-y-1 py-2"></div>

        <div class="p-4 border-t border-borderDark flex items-center justify-between bg-darkBg/50">

              U
            </div>
            <span id="userEmailDisplay" class="text-xs text-gray-300 truncate">user@aura.ai</span>
          </div>
          <button id="btnLogout" class="p-2 text-gray-400 hover:text-red-400 rounded-lg hover:bg-darkBg transition" title="Log Out">
            <i data-lucide="log-out" class="w-4 h-4"></i>
          </button>
        </div>
      </aside>

      <!-- Main Chat Area -->
      <main class="flex-1 flex flex-col h-full relative overflow-hidden bg-darkBg">
        
        <header class="h-14 border-b border-borderDark flex items-center justify-between px-4 bg-panelBg/80 backdrop-blur shrink-0 z-10">
          <button id="btnToggleSidebar" class="p-2 text-gray-300 hover:text-white rounded-lg hover:bg-darkBg transition">
            <i data-lucide="menu" class="w-5 h-5"></i>
          </button>

          <span class="text-xs font-semibold text-gray-300 bg-darkBg px-3.5 py-1.5 rounded-full border border-orange/30 flex items-center gap-2 shadow-sm shadow-orange/10">
            <span class="w-2 h-2 rounded-full bg-orange animate-pulse"></span>
            AURA AI
          </span>

          <button id="btnHeaderNewChat" class="p-2 text-gray-300 hover:text-white rounded-lg hover:bg-darkBg transition">
            <i data-lucide="square-pen" class="w-5 h-5"></i>
          </button>
        </header>

        <!-- Empty Welcome Greeting -->
        <div id="emptyGreeting" class="flex-1 flex flex-col items-center justify-center p-6 text-center select-none overflow-y-auto">
          <div class="p-4 bg-orange/5 rounded-full border border-orange/10 mb-4">
            <i data-lucide="code-2" class="w-8 h-8 text-orange"></i>
          </div>
          <h2 id="rotatingGreet" class="text-2xl sm:text-3xl font-bold text-white mb-2 transition-opacity duration-500 opacity-100">Welcome back</h2>
          <p class="text-gray-400 text-sm max-w-sm">Ask a question, upload photos, or attach code files to begin.</p>
        </div>

        <!-- Dynamic Messages Container -->
        <div id="messagesContainer" class="hidden flex-1 overflow-y-auto p-4 sm:p-6 space-y-6"></div>

        <!-- Input Bar -->
        <div class="shrink-0 p-3 sm:p-4 bg-black border-t border-orange/40 z-20 w-full">
          <div class="max-w-3xl mx-auto">
            
            <!-- Attachment & Image Editable Thumbnail Preview Bar -->
            <div id="attachmentPreview" class="hidden mb-2 p-2 bg-panelBg border border-orange rounded-xl flex items-center justify-between gap-2 text-xs text-gray-300">
              <div class="flex items-center gap-2 overflow-hidden">
                <img id="imgPreviewThumb" class="w-12 h-12 object-cover rounded-lg border border-orange hidden" alt="Preview">
                <i id="previewFileIcon" data-lucide="file-text" class="w-5 h-5 text-orange hidden shrink-0"></i>
                <span id="attachmentName" class="truncate font-medium text-white">filename.txt</span>
              </div>
              <button id="btnRemoveAttachment" class="text-gray-400 hover:text-red-400 p-1">
                <i data-lucide="x" class="w-4 h-4"></i>
              </button>
            </div>

            <!-- Black Input Container Box -->
            <div style="background-color: #000000 !important; border: 1.5px solid #FF5500 !important;" class="rounded-2xl p-2 shadow-xl">
              <textarea id="chatInput" rows="1" placeholder="Ask AURA anything..." style="background-color: #000000 !important; color: #ffffff !important;" class="w-full px-3 py-2 text-sm focus:outline-none resize-none max-h-32 min-h-[40px]"></textarea>
              
              <div class="flex items-center justify-between pt-2 px-1 border-t border-gray-800">
                <div class="flex items-center gap-1">
                  <input type="file" id="fileAttach" accept="image/*,text/*,.js,.jsx,.py,.html,.css,.json,.ts,.tsx" class="hidden">
                  <button id="btnAttach" class="p-2 text-gray-400 hover:text-orange hover:bg-panelBg rounded-lg transition" title="Attach file or image">
                    <i data-lucide="paperclip" class="w-4 h-4"></i>
                  </button>
                </div>

                <button id="btnSend" class="p-2.5 bg-orange text-black font-bold rounded-xl hover:bg-orange/90 transition active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed">
                  <i data-lucide="send" class="w-4 h-4"></i>
                </button>
              </div>
            </div>
            
            <p class="text-[10px] text-center text-gray-500 mt-1.5">AURA may produce inaccurate code. Verify before production deployment.</p>
          </div>
        </div>

      </main>
    </section>

  </div>

  <script type="module">
    import { initializeApp } from "firebase/app";
    import { 
      getAuth, 
      createUserWithEmailAndPassword, 
      signInWithEmailAndPassword, 
      signOut, 
      onAuthStateChanged,
      sendPasswordResetEmail,
      GoogleAuthProvider,
      signInWithPopup
    } from "firebase/auth";
    import { 
      getFirestore, 
      doc, 
      setDoc, 
      getDoc, 
      onSnapshot 
    } from "firebase/firestore";

    const firebaseConfig = {
      apiKey: "AIzaSyDTAqb0waoaoSDrwOa2UXRjwl8wmSyXUs0",
      authDomain: "my-wyticle-id.firebaseapp.com",
      projectId: "my-wyticle-id",
      storageBucket: "my-wyticle-id.firebasestorage.app",
      messagingSenderId: "634169882815",
      appId: "1:634169882815:web:486d39a13ce2f855c0ae0a",
      measurementId: "G-7X84RSMH58"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const googleProvider = new GoogleAuthProvider();

    let currentUser = null;
    let authIsSignUp = true;
    let chats = [];
    let currentChatId = null;
    let attachmentData = null;
    let editingMessageIndex = null;

    const welcomePage = document.getElementById('welcomePage');
    const authPage = document.getElementById('authPage');
    const chatPage = document.getElementById('chatPage');
    const sidebar = document.getElementById('sidebar');
    const sidebarOverlay = document.getElementById('sidebarOverlay');
    const chatInput = document.getElementById('chatInput');
    const btnSend = document.getElementById('btnSend');
    const messagesContainer = document.getElementById('messagesContainer');
    const emptyGreeting = document.getElementById('emptyGreeting');
    const chatHistoryList = document.getElementById('chatHistoryList');

    lucide.createIcons();

    // Particle Canvas Animation
    const canvas = document.getElementById('particleCanvas');
    const ctx = canvas.getContext('2d');
    let particles = [];

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    class Particle {
      constructor() { this.reset(); }
      reset() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 2 + 1;
        this.speedX = (Math.random() - 0.5) * 0.5;
        this.speedY = (Math.random() - 0.5) * 0.5;
        this.alpha = Math.random() * 0.5 + 0.2;
      }
      update() {
        this.x += this.speedX;
        this.y += this.speedY;
        if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.reset();
      }
      draw() {
        ctx.fillStyle = `rgba(255, 85, 0, ${this.alpha})`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    for (let i = 0; i < 50; i++) particles.push(new Particle());
    function animateParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => { p.update(); p.draw(); });
      requestAnimationFrame(animateParticles);
    }
    animateParticles();

    // Dynamic Texts
    const welcomeTexts = ["Your Coding Partner", "Generate, Debug, Deploy", "Powered by AURA Engine"];
    let welcomeTextIdx = 0;
    const rotatingTextEl = document.getElementById('rotatingText');
    setInterval(() => {
      if (!rotatingTextEl) return;
      rotatingTextEl.style.opacity = '0';
      setTimeout(() => {
        welcomeTextIdx = (welcomeTextIdx + 1) % welcomeTexts.length;
        rotatingTextEl.textContent = welcomeTexts[welcomeTextIdx];
        rotatingTextEl.style.opacity = '1';
      }, 500);
    }, 3000);

    const greetTexts = ["Welcome back", "Where should we start today?", "Ready to build?"];
    let greetTextIdx = 0;
    const rotatingGreetEl = document.getElementById('rotatingGreet');
    setInterval(() => {
      if (!rotatingGreetEl) return;
      rotatingGreetEl.style.opacity = '0';
      setTimeout(() => {
        greetTextIdx = (greetTextIdx + 1) % greetTexts.length;
        rotatingGreetEl.textContent = greetTexts[greetTextIdx];
        rotatingGreetEl.style.opacity = '1';
      }, 500);
    }, 3500);

    // Auth & Navigation
    function showPage(page) {
      welcomePage.classList.add('hidden');
      authPage.classList.add('hidden');
      chatPage.classList.add('hidden');
      page.classList.remove('hidden');
    }

    document.getElementById('btnStartCoding').onclick = () => { setAuthMode(true); showPage(authPage); };
    document.getElementById('btnWelcomeLogin').onclick = () => { setAuthMode(false); showPage(authPage); };
    document.getElementById('btnBackToWelcome').onclick = () => showPage(welcomePage);

    function setAuthMode(isSignUp) {
      authIsSignUp = isSignUp;
      document.getElementById('authTitle').textContent = isSignUp ? "Create Account" : "Welcome Back";
      document.getElementById('fieldConfirmPass').style.display = isSignUp ? 'block' : 'none';
      document.getElementById('btnAuthSubmit').textContent = isSignUp ? "Sign Up" : "Log In";
      document.getElementById('btnToggleAuthMode').innerHTML = isSignUp 
        ? 'Already have an account? <span class="text-orange font-medium">Log In</span>'
        : 'Need an account? <span class="text-orange font-medium">Sign Up</span>';
      document.getElementById('authError').classList.add('hidden');
    }

    document.getElementById('btnToggleAuthMode').onclick = () => setAuthMode(!authIsSignUp);

    document.querySelectorAll('.btnTogglePass').forEach(btn => {
      btn.onclick = () => {
        const input = btn.previousElementSibling;
        input.type = input.type === 'password' ? 'text' : 'password';
      };
    });

    // Fixed Firebase Authentication Logic
    document.getElementById('authForm').onsubmit = async (e) => {
      e.preventDefault();
      const email = document.getElementById('inputEmail').value.trim();
      const password = document.getElementById('inputPassword').value;
      const errorEl = document.getElementById('authError');
      errorEl.classList.add('hidden');

      try {
        if (authIsSignUp) {
          const confirmPass = document.getElementById('inputConfirmPassword').value;
          if (password !== confirmPass) throw new Error("Passwords do not match");
          await createUserWithEmailAndPassword(auth, email, password);
        } else {
          await signInWithEmailAndPassword(auth, email, password);
        }
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.classList.remove('hidden');
      }
    };

    document.getElementById('btnGoogleAuth').onclick = async () => {
      try {
        await signInWithPopup(auth, googleProvider);
      } catch (err) {
        const errorEl = document.getElementById('authError');
        errorEl.textContent = err.message;
        errorEl.classList.remove('hidden');
      }
    };

    document.getElementById('btnForgotPassword').onclick = async () => {
      const email = prompt("Enter your email address to reset password:");
      if (email) {
        try {
          await sendPasswordResetEmail(auth, email);
          alert("Password reset email sent!");
        } catch (err) { alert("Error: " + err.message); }
      }
    };

    document.getElementById('btnLogout').onclick = () => signOut(auth);

    onAuthStateChanged(auth, (user) => {
      currentUser = user;
      if (user) {
        document.getElementById('userEmailDisplay').textContent = user.email || 'Anonymous User';
        document.getElementById('userAvatar').textContent = (user.email || 'U').charAt(0).toUpperCase();
        showPage(chatPage);
        loadChats();
      } else {
        if (!welcomePage.classList.contains('hidden') || !chatPage.classList.contains('hidden')) {
          showPage(welcomePage);
        }
      }
    });

    // Sidebar Collapsible Toggles
    function openSidebar() {
      sidebar.classList.remove('-translate-x-full');
      sidebarOverlay.classList.remove('opacity-0', 'pointer-events-none');
    }

    function closeSidebar() {
      sidebar.classList.add('-translate-x-full');
      sidebarOverlay.classList.add('opacity-0', 'pointer-events-none');
    }

    document.getElementById('btnToggleSidebar').onclick = () => {
      if (sidebar.classList.contains('-translate-x-full')) openSidebar();
      else closeSidebar();
    };
    document.getElementById('btnCloseSidebar').onclick = closeSidebar;
    sidebarOverlay.onclick = closeSidebar;

    document.getElementById('inputSearchChats').oninput = (e) => renderChatHistory(e.target.value.toLowerCase());
    document.getElementById('btnNewChat').onclick = createNewChat;
    document.getElementById('btnHeaderNewChat').onclick = createNewChat;

    function createNewChat() {
      currentChatId = Date.now().toString();
      chats.unshift({ id: currentChatId, title: "New Conversation", updatedAt: Date.now(), messages: [] });
      saveChats();
      renderChatHistory();
      selectChat(currentChatId);
      if (window.innerWidth < 768) closeSidebar();
    }

    // Chat Sync
    function saveChats() {
      if (!currentUser) return;
      localStorage.setItem(`aura_chats_${currentUser.uid}`, JSON.stringify(chats));
      setDoc(doc(db, "users", currentUser.uid), { chats: chats }, { merge: true }).catch(err => console.error("Sync error:", err));
    }

    async function loadChats() {
      if (!currentUser) return;
      const localData = localStorage.getItem(`aura_chats_${currentUser.uid}`);
      if (localData) {
        try { chats = JSON.parse(localData); renderChatHistory(); } catch (e) { chats = []; }
      }
      onSnapshot(doc(db, "users", currentUser.uid), (docSnap) => {
        if (docSnap.exists() && docSnap.data().chats) {
          chats = docSnap.data().chats;
          localStorage.setItem(`aura_chats_${currentUser.uid}`, JSON.stringify(chats));
          renderChatHistory();
          if (currentChatId) renderMessages();
        }
      });
    }

    function renderChatHistory(filter = "") {
      chatHistoryList.innerHTML = "";
      const filtered = chats.filter(c => c.title.toLowerCase().includes(filter));
      if (filtered.length === 0) {
        chatHistoryList.innerHTML = `<div class="text-xs text-gray-500 p-2 text-center">No chats found</div>`;
        return;
      }

      filtered.forEach(chat => {
        const item = document.createElement('div');
        const isActive = chat.id === currentChatId;
        item.className = `group flex items-center justify-between p-2.5 rounded-xl text-xs cursor-pointer transition ${
          isActive ? 'bg-orange/10 text-orange border border-orange/20' : 'text-gray-300 hover:bg-darkBg hover:text-white'
        }`;
        item.innerHTML = `
          <div class="flex items-center gap-2 overflow-hidden flex-1">
            <i data-lucide="message-square" class="w-3.5 h-3.5 flex-shrink-0"></i>
            <span class="truncate">${escapeHtml(chat.title)}</span>
          </div>
          <button class="btnDeleteChat opacity-0 group-hover:opacity-100 p-1 hover:text-red-400 transition" title="Delete">
            <i data-lucide="trash-2" class="w-3 h-3"></i>
          </button>
        `;
        item.onclick = (e) => {
          if (e.target.closest('.btnDeleteChat')) {
            e.stopPropagation();
            deleteChat(chat.id);
          } else {
            selectChat(chat.id);
            if (window.innerWidth < 768) closeSidebar();
          }
        };
        chatHistoryList.appendChild(item);
      });
      lucide.createIcons();
    }

    function selectChat(id) {
      currentChatId = id;
      renderChatHistory();
      renderMessages();
    }

    function deleteChat(id) {
      chats = chats.filter(c => c.id !== id);
      if (currentChatId === id) currentChatId = chats.length > 0 ? chats[0].id : null;
      saveChats();
      renderChatHistory();
      renderMessages();
    }

    // Messages Pipeline
    function renderMessages() {
      const activeChat = chats.find(c => c.id === currentChatId);
      if (!activeChat || activeChat.messages.length === 0) {
        emptyGreeting.classList.remove('hidden');
        messagesContainer.classList.add('hidden');
        messagesContainer.innerHTML = '';
        return;
      }

      emptyGreeting.classList.add('hidden');
      messagesContainer.classList.remove('hidden');
      messagesContainer.innerHTML = '';

      activeChat.messages.forEach((msg, idx) => {
        messagesContainer.appendChild(createMessageElement(msg, idx));
      });

      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    function createMessageElement(msg, index) {
      const isUser = msg.role === 'user';
      const wrapper = document.createElement('div');
      wrapper.className = `group flex flex-col ${isUser ? 'items-end' : 'items-start'} space-y-1 relative mb-4`;

      // User Bubble: Solid Black background, White text, Orange border
      const contentDiv = document.createElement('div');
      if (isUser) {
        contentDiv.className = `max-w-[90%] sm:max-w-[80%] rounded-2xl rounded-tr-none p-4 text-sm leading-relaxed shadow-lg`;
        contentDiv.style.backgroundColor = '#000000';
        contentDiv.style.color = '#ffffff';
        contentDiv.style.border = '1px solid #FF5500';
      } else {
        contentDiv.className = `max-w-[90%] sm:max-w-[80%] rounded-2xl rounded-tl-none p-4 text-sm leading-relaxed bg-panelBg border border-borderDark text-gray-100 shadow-lg`;
      }

      if (isUser) {
        // Render Image Card if attached
        if (msg.attachment && msg.attachment.isImage && msg.attachment.data) {
          const img = document.createElement('img');
          img.src = msg.attachment.data;
          img.className = "max-w-full max-h-56 rounded-xl mb-2 object-cover border border-orange/40 shadow";
          contentDiv.appendChild(img);
        }

        // Render File Badge at top of user request if attached
        if (msg.attachment && !msg.attachment.isImage && msg.attachment.name) {
          const fileCard = document.createElement('div');
          fileCard.className = "mb-2 p-2 bg-black/60 border border-orange/40 rounded-xl flex items-center gap-2 text-xs font-mono text-orange";
          fileCard.innerHTML = `<i data-lucide="file-code" class="w-4 h-4 shrink-0"></i><span class="truncate">${escapeHtml(msg.attachment.name)}</span>`;
          contentDiv.appendChild(fileCard);
        }

        if (msg.text) {
          const p = document.createElement('p');
          p.textContent = msg.text;
          contentDiv.appendChild(p);
        }
      } else {
        contentDiv.innerHTML = parseMarkdown(msg.text);
      }

      const actions = document.createElement('div');
      actions.className = `opacity-0 group-hover:opacity-100 transition flex items-center gap-1 bg-panelBg border border-borderDark px-2 py-1 rounded-lg text-[10px] text-gray-400 absolute ${
        isUser ? '-bottom-5 right-0' : '-bottom-5 left-0'
      } z-10`;

      if (isUser) {
        actions.innerHTML = `<button class="btnDelMsg hover:text-red-400 px-1">Delete</button>`;
      } else {
        actions.innerHTML = `<button class="btnRegenMsg hover:text-orange px-1">Regenerate</button><span>|</span><button class="btnDelMsg hover:text-red-400 px-1">Delete</button>`;
      }

      wrapper.appendChild(contentDiv);
      wrapper.appendChild(actions);

      actions.querySelector('.btnDelMsg')?.addEventListener('click', () => deleteMessage(index));
      actions.querySelector('.btnRegenMsg')?.addEventListener('click', () => regenerateMessage(index));
      lucide.createIcons();

      return wrapper;
    }

    function deleteMessage(index) {
      const activeChat = chats.find(c => c.id === currentChatId);
      if (!activeChat) return;
      activeChat.messages.splice(index, 1);
      saveChats();
      renderMessages();
    }

    function regenerateMessage(aiIndex) {
      const activeChat = chats.find(c => c.id === currentChatId);
      if (!activeChat || aiIndex === 0) return;
      activeChat.messages.splice(aiIndex, 1);
      saveChats();
      renderMessages();
      sendPromptToAI();
    }

    // Attachments Pipeline with Editable Thumbnail Previews
    document.getElementById('btnAttach').onclick = () => document.getElementById('fileAttach').click();
    document.getElementById('fileAttach').onchange = (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const isImage = file.type.startsWith('image/');
      const reader = new FileReader();

      if (isImage) {
        reader.onload = (event) => {
          const dataUrl = event.target.result;
          attachmentData = {
            name: file.name,
            mimeType: file.type,
            data: dataUrl,
            isImage: true
          };
          const thumb = document.getElementById('imgPreviewThumb');
          thumb.src = dataUrl;
          thumb.classList.remove('hidden');
          document.getElementById('previewFileIcon').classList.add('hidden');
          document.getElementById('attachmentName').textContent = file.name;
          document.getElementById('attachmentPreview').classList.remove('hidden');
        };
        reader.readAsDataURL(file);
      } else {
        reader.onload = (event) => {
          attachmentData = {
            name: file.name,
            content: event.target.result,
            isImage: false
          };
          document.getElementById('imgPreviewThumb').classList.add('hidden');
          document.getElementById('previewFileIcon').classList.remove('hidden');
          document.getElementById('attachmentName').textContent = file.name;
          document.getElementById('attachmentPreview').classList.remove('hidden');
          lucide.createIcons();
        };
        reader.readAsText(file);
      }
    };

    document.getElementById('btnRemoveAttachment').onclick = () => {
      attachmentData = null;
      document.getElementById('fileAttach').value = "";
      document.getElementById('attachmentPreview').classList.add('hidden');
    };

    chatInput.addEventListener('input', () => {
      chatInput.style.height = 'auto';
      chatInput.style.height = `${Math.min(chatInput.scrollHeight, 128)}px`;
    });

    chatInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        handleSendMessage();
      }
    });

    btnSend.onclick = handleSendMessage;

    function handleSendMessage() {
      let promptText = chatInput.value.trim();
      if (!promptText && !attachmentData) return;
      const currentAttachment = attachmentData;

      attachmentData = null;
      document.getElementById('fileAttach').value = "";
      document.getElementById('attachmentPreview').classList.add('hidden');
      chatInput.value = "";
      chatInput.style.height = 'auto';

      if (!currentChatId) {
        currentChatId = Date.now().toString();
        chats.unshift({
          id: currentChatId,
          title: (promptText || "Media Attachment").slice(0, 30) + "...",
          updatedAt: Date.now(),
          messages: []
        });
      }

      const activeChat = chats.find(c => c.id === currentChatId);
      if (activeChat.messages.length === 0) {
        activeChat.title = (promptText || "Media Attachment").slice(0, 30) + "...";
      }

      activeChat.messages.push({ 
        role: 'user', 
        text: promptText, 
        attachment: currentAttachment 
      });

      saveChats();
      renderChatHistory();
      renderMessages();

      sendPromptToAI();
    }

    async function sendPromptToAI() {
      const activeChat = chats.find(c => c.id === currentChatId);
      if (!activeChat) return;

      const userEmail = currentUser?.email || "";
      const lastUserMsg = activeChat.messages[activeChat.messages.length - 1];

      const aiMessageObj = { role: 'assistant', text: "Analyzing..." };
      activeChat.messages.push(aiMessageObj);
      renderMessages();

      btnSend.disabled = true;

      try {
        const formattedMessages = activeChat.messages.slice(0, -1).map(m => ({
          role: m.role === 'user' ? 'user' : 'assistant',
          content: m.text
        }));

        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 
            'Content-Type': 'application/json',
            'X-User-Email': userEmail
          },
          body: JSON.stringify({ 
            messages: formattedMessages,
            prompt: lastUserMsg?.text || "",
            attachment: lastUserMsg?.attachment || null
          })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.text || "Server returned an error");
        }

        aiMessageObj.text = data.text || "No response received.";
      } catch (err) {
        aiMessageObj.text = `⚠️ Error: ${err.message}`;
      } finally {
        btnSend.disabled = false;
        saveChats();
        renderMessages();
      }
    }

    // Markdown Parser
    function parseMarkdown(text) {
      const rawHtml = marked.parse(text);
      const temp = document.createElement('div');
      temp.innerHTML = rawHtml;

      temp.querySelectorAll('pre code').forEach((codeEl) => {
        const langClass = Array.from(codeEl.classList).find(c => c.startsWith('language-'));
        const lang = langClass ? langClass.replace('language-', '') : 'jsx';

        hljs.highlightElement(codeEl);

        const pre = codeEl.parentElement;
        const container = document.createElement('div');
        container.className = "code-block-container my-3 rounded-xl overflow-hidden border border-borderDark bg-[#282c34]";

        const header = document.createElement('div');
        header.className = "flex items-center justify-between px-4 py-2 bg-darkBg/90 border-b border-borderDark text-xs font-mono text-gray-400";
        header.innerHTML = `
          <span class="text-orange font-semibold uppercase tracking-wider">${lang}</span>
          <div class="flex items-center gap-3">
            <button type="button" class="btnCopyCode hover:text-white transition flex items-center gap-1 cursor-pointer">
              <i data-lucide="copy" class="w-3.5 h-3.5"></i> Copy
            </button>
            <button type="button" class="btnDownloadCode hover:text-white transition flex items-center gap-1 cursor-pointer" data-lang="${lang}">
              <i data-lucide="download" class="w-3.5 h-3.5"></i> Download
            </button>
          </div>
        `;

        container.appendChild(header);
        pre.parentNode.insertBefore(container, pre);
        container.appendChild(pre);
      });

      return temp.innerHTML;
    }

    document.addEventListener('click', (e) => {
      const copyBtn = e.target.closest('.btnCopyCode');
      if (copyBtn) {
        e.preventDefault();
        e.stopPropagation();
        const container = copyBtn.closest('.code-block-container');
        if (container) {
          const codeEl = container.querySelector('code');
          if (codeEl) copyToClipboard(codeEl.innerText || codeEl.textContent, copyBtn);
        }
        return;
      }

      const downloadBtn = e.target.closest('.btnDownloadCode');
      if (downloadBtn) {
        e.preventDefault();
        e.stopPropagation();
        const container = downloadBtn.closest('.code-block-container');
        if (container) {
          const codeEl = container.querySelector('code');
          if (codeEl) {
            const rawText = codeEl.innerText || codeEl.textContent;
            const lang = downloadBtn.getAttribute('data-lang') || 'jsx';
            downloadCodeFile(`code.${getExtensionForLang(lang)}`, rawText);
          }
        }
        return;
      }
    });

    function copyToClipboard(text, btnElement) {
      if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(text).then(() => showCopySuccess(btnElement)).catch(() => fallbackCopy(text, btnElement));
      } else {
        fallbackCopy(text, btnElement);
      }
    }

    function fallbackCopy(text, btnElement) {
      const textarea = document.createElement('textarea');
      textarea.value = text;
      textarea.style.position = 'fixed';
      textarea.style.top = '0';
      textarea.style.left = '-9999px';
      document.body.appendChild(textarea);
      textarea.select();
      try {
        document.execCommand('copy');
        showCopySuccess(btnElement);
      } catch (err) { alert('Copy failed.'); }
      document.body.removeChild(textarea);
    }

    function showCopySuccess(btnElement) {
      if (btnElement) {
        btnElement.innerHTML = `<i data-lucide="check" class="w-3.5 h-3.5 text-orange"></i> Copied!`;
        lucide.createIcons();
        setTimeout(() => {
          btnElement.innerHTML = `<i data-lucide="copy" class="w-3.5 h-3.5"></i> Copy`;
          lucide.createIcons();
        }, 2000);
      }
    }

    function downloadCodeFile(filename, text) {
      const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = filename;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      setTimeout(() => URL.revokeObjectURL(url), 200);
    }

    function getExtensionForLang(lang) {
      const map = { javascript: 'js', js: 'js', jsx: 'jsx', typescript: 'ts', ts: 'ts', tsx: 'tsx', python: 'py', html: 'html', css: 'css', json: 'json' };
      return map[lang.toLowerCase()] || 'txt';
    }

    function escapeHtml(str) {
      return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }
  </script>
</body>
